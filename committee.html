<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紘嘉物業管理 - 主委專區</title>
  <style>
    :root { --primary-color: #4f46e5; --bg-color: #f3f4f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 20px; }
    .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .header-box { display: flex; justify-content: space-between; align-items: center; }
    h2 { color: #1f2937; font-size: 18px; font-weight: bold; }
    .location-tag { color: #4f46e5; font-weight: 600; font-size: 14px; margin-top: 2px; }
    .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .grid-layout { grid-template-columns: 1fr; } }
    .section-title { font-size: 15px; font-weight: 600; color: #374151; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f9fafb; padding: 10px; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
    td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: center; }
    .badge { padding: 4px 8px; border-radius: 9999px; font-size: 12px; }
    .badge-in { background: #dcfce7; color: #15803d; }
    .badge-out { background: #fef3c7; color: #d97706; }
    .badge-pending { background: #fce7f3; color: #9d174d; }
    .badge-approved { background: #e0e7ff; color: #4338ca; }
    input { width: 100%; padding: 11px; margin-bottom: 14px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { width: 100%; padding: 11px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    
    /* 💡 強制隱藏的關鍵樣式 */
    .hidden { display: none !important; }
    .no-data { color: #9ca3af; font-style: italic; padding: 15px 0; }
  </style>
</head>
<body>

  <div class="container">
    <!-- 1. 登入區塊 (未登入前只顯示這一塊) -->
    <div id="login-box" class="card" style="max-width: 380px; margin: 40px auto; width:100%;">
      <h2 style="text-align: center; margin-bottom: 16px;">案場主委/管理端登入</h2>
      <input type="text" id="username" placeholder="請輸入主委專屬帳號">
      <input type="password" id="password" placeholder="請輸入密碼">
      <button onclick="login()">登入系統</button>
    </div>

    <!-- 2. 主委數據面板 (全部封裝在 hidden 的貨櫃內，登入前絕不外洩) -->
    <div id="dashboard" class="hidden">
      <div style="display: flex; flex-direction: column; gap: 20px;">
        
        <!-- 頂部指派案場卡 -->
        <div class="card header-box">
          <div>
            <h2 id="committee-welcome">主委，您好</h2>
            <div class="location-tag" id="committee-location">監督案場：連線中...</div>
          </div>
          <button onclick="location.reload()" style="width: auto; padding: 6px 12px; background: #f3f4f6; color: #4b5563;">登出</button>
        </div>

        <!-- 數據表格區 (即時考勤與請假) -->
        <div class="grid-layout">
          <!-- 考勤動態 -->
          <div class="card">
            <div class="section-title">📌 今日案場打卡動態</div>
            <table>
              <thead><tr><th>員工</th><th>狀態</th><th>時間</th></tr></thead>
              <tbody id="attendance-list"><tr><td colspan="3" class="no-data">暫無打卡數據</td></tr></tbody>
            </table>
          </div>

          <!-- 請假狀態 -->
          <div class="card">
            <div class="section-title">📅 本社區員工請假狀態申請</div>
            <table>
              <thead><tr><th>員工</th><th>假別</th><th>狀態</th></tr></thead>
              <tbody id="leave-list"><tr><td colspan="3" class="no-data">暫無請假申請</td></tr></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ⚠️ 請記得填入您最新部署的 GAS 正式網址 (/exec 結尾)
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec"; 

    function login() {
      const user = document.getElementById('username').value.trim();
      const pwd = document.getElementById('password').value.trim();
      if(!user || !pwd) return alert('請輸入主委帳密');

      fetch(`${GAS_WEB_APP_URL}?action=committeeLogin&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pwd)}`)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            // 寫入主委與案場資訊
            document.getElementById('committee-welcome').innerText = `${data.committeeName || user} 主委，您好`;
            document.getElementById('committee-location').innerText = `🏠 監督案場：${data.location}`;

            // 渲染考勤動態
            let attHtml = "";
            if(data.attendance && data.attendance.length > 0) {
              data.attendance.forEach(a => {
                let bClass = a.type === '上班' ? 'badge badge-in' : 'badge badge-out';
                attHtml += `<tr><td><strong>${a.name}</strong></td><td><span class="${bClass}">${a.type}</span></td><td>${a.time}</td></tr>`;
              });
              document.getElementById('attendance-list').innerHTML = attHtml;
            } else { document.getElementById('attendance-list').innerHTML = "<tr><td colspan='3' class='no-data'>今日尚無本社區人員打卡</td></tr>"; }

            // 渲染請假紀錄
            let leaveHtml = "";
            if(data.leaves && data.leaves.length > 0) {
              data.leaves.forEach(l => {
                let bClass = l.status === '已核准' ? 'badge badge-approved' : 'badge badge-pending';
                leaveHtml += `<tr><td><strong>${l.name}</strong></td><td>${l.type}</td><td><span class="${bClass}">${l.status}</span></td></tr>`;
              });
              document.getElementById('leave-list').innerHTML = leaveHtml;
            } else { document.getElementById('leave-list').innerHTML = "<tr><td colspan='3' class='no-data'>目前無任何請假紀錄</td></tr>"; }

            // 💡 登入成功：隱藏登入盒，秀出主委管理面板
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
          } else { alert(data.message); }
        }).catch(err => alert("連線失敗！請檢查您的 GAS 網址與權限設定。"));
    }
  </script>
</body>
</html>
