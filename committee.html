<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物業管理-主委專區</title>
  <style>
    :root { --primary-color: #28a745; --bg-color: #f8f9fa; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; display: flex; justify-content: center; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
    h2 { text-align: center; margin-bottom: 20px; color: #333; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
    button { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .hidden { display: none; }
    .info-box { background: #e2f0d9; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #385723; }
    .section-title { font-weight: bold; margin: 15px 0 8px 0; border-left: 4px solid var(--primary-color); padding-left: 8px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .badge { background: #ffeb3b; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .badge-approved { background: #c8e6c9; color: #256029; }
  </style>
</head>
<body>

  <div id="login-box" class="card">
    <h2>案場主委/管理端登入</h2>
    <input type="text" id="username" placeholder="請輸入主委專屬帳號">
    <input type="password" id="password" placeholder="請輸入密碼">
    <button onclick="login()">登入系統</button>
  </div>

  <div id="dashboard" class="card hidden">
    <div class="info-box" id="committee-welcome">陳曉明主委，您好</div>
    
    <div class="section-title">📌 今日案場打卡動態</div>
    <table>
      <thead><tr><th>員工</th><th>狀態</th><th>時間</th></tr></thead>
      <tbody id="attendance-list"></tbody>
    </table>

    <div class="section-title">📝 員工請假狀態申請 (限本社區同仁)</div>
    <table>
      <thead><tr><th>員工</th><th>假別</th><th>狀態</th></tr></thead>
      <tbody id="leave-list"></tbody>
    </table>
  </div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/XXXXX/exec"; 

    function login() {
      const user = document.getElementById('username').value;
      const pwd = document.getElementById('password').value;
      
      fetch(`${GAS_WEB_APP_URL}?action=committeeLogin&username=${user}&password=${pwd}`)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            document.getElementById('committee-welcome').innerText = `${user} 主委，您好\n監督案場：${data.location}`;
            
            // 1. 渲染今日打卡動態
            let attHtml = "";
            data.attendance.forEach(a => {
              attHtml += `<tr><td>${a.name}</td><td>${a.type}</td><td>${a.time}</td></tr>`;
            });
            document.getElementById('attendance-list').innerHTML = attHtml || "<tr><td colspan='3'>今日尚無打卡紀錄</td></tr>";

            // 2. 渲染【已過濾、嚴格僅限該社區】的請假申請
            let leaveHtml = "";
            data.leaves.forEach(l => {
              let badgeClass = l.status === '已核準' ? 'badge badge-approved' : 'badge';
              leaveHtml += `<tr><td>${l.name}</td><td>${l.type}</td><td><span class="${badgeClass}">${l.status}</span></td></tr>`;
            });
            document.getElementById('leave-list').innerHTML = leaveHtml || "<tr><td colspan='3'>目前無任何請假申請紀錄</td></tr>";

            document.getElementById('login-box').add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
          } else {
            alert(data.message);
          }
        });
    }
  </script>
</body>
</html>
