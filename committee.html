<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物業考勤系統 - 主委端</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";
    </script>

    <div id="login-box" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">物業考勤系統 (主委登入)</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">主委帳號</label>
                <input type="text" id="username" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="請輸入帳號">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">登入密碼</label>
                <input type="password" id="password" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="請輸入密碼">
            </div>
            <button onclick="login()" id="login-btn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition">登入系統</button>
            <p id="error-msg" class="text-red-500 text-center text-sm hidden mt-2"></p>
        </div>
    </div>

    <div id="main-panel" class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-2xl hidden">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <div>
                <h2 id="welcome-title" class="text-xl font-bold text-gray-800">歡迎</h2>
                <p id="location-tag" class="text-sm text-indigo-600 font-medium"></p>
            </div>
            <button onclick="logout()" class="text-sm bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-300">登出</button>
        </div>

        <div class="mb-6">
            <h3 class="font-semibold text-gray-700 mb-2">📌 今日人員打卡動態</h3>
            <div class="bg-gray-50 rounded-xl p-4 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-xs text-gray-500 border-b">
                            <th class="pb-2">員工姓名</th>
                            <th class="pb-2">動作</th>
                            <th class="pb-2">時間</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-list" class="text-sm text-gray-700 divide-y">
                        </tbody>
                </table>
                <p id="no-attendance" class="text-gray-400 text-center py-4 text-sm hidden">今日尚無打卡紀錄</p>
            </div>
        </div>

        <div>
            <h3 class="font-semibold text-gray-700 mb-2">📢 社區最新公告</h3>
            <div id="announcement-list" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        async function login() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("error-msg");
            const loginBtn = document.getElementById("login-btn");

            if (!user || !pass) {
                showError("請輸入帳號與密碼");
                return;
            }

            loginBtn.innerText = "登入中...";
            loginBtn.disabled = true;
            errorMsg.classList.add("hidden");

            try {
                // 🚀 重點：這裡發送的 action 必須是 committeeLogin
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "committeeLogin",
                        username: user,
                        password: pass
                    })
                });
                const result = await response.json();

                if (result.success) {
                    document.getElementById("login-box").classList.add("hidden");
                    document.getElementById("main-panel").classList.remove("hidden");
                    
                    document.getElementById("welcome-title").innerText = `${result.committeeName} 主委，您好`;
                    document.getElementById("location-tag").innerText = `所屬案場：${result.location}`;
                    
                    renderAttendance(result.attendance);
                    renderAnnouncements(result.announcements);
                } else {
                    showError(result.message || "帳密錯誤");
                }
            } catch (err) {
                showError("連線失敗，請檢查網路或 GAS 網址");
            } finally {
                loginBtn.innerText = "登入系統";
                loginBtn.disabled = false;
            }
        }

        function renderAttendance(list) {
            const container = document.getElementById("attendance-list");
            const noData = document.getElementById("no-attendance");
            container.innerHTML = "";
            
            if (!list || list.length === 0) {
                noData.classList.remove("hidden");
                return;
            }
            noData.classList.add("hidden");

            list.forEach(item => {
                const badgeColor = item.type === "上班" ? "bg-green-100 text-green-800" : "bg-orange-100 text-orange-800";
                container.innerHTML += `
                    <tr>
                        <td class="py-2 font-medium">${item.name}</td>
                        <td class="py-2"><span class="px-2 py-0.5 rounded text-xs ${badgeColor}">${item.type}</span></td>
                        <td class="py-2 text-gray-500">${item.time}</td>
                    </tr>
                `;
            });
        }

        function renderAnnouncements(list) {
            const container = document.getElementById("announcement-list");
            container.innerHTML = "";
            if (!list || list.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-sm text-center py-2">目前無公告</p>`;
                return;
            }
            list.forEach(item => {
                container.innerHTML += `
                    <div class="bg-indigo-50/50 p-3 rounded-xl border border-indigo-100">
                        <div class="flex justify-between items-center mb-1">
                            <h4 class="font-bold text-sm text-gray-800">${item.title}</h4>
                            <span class="text-xs text-gray-400">${item.date}</span>
                        </div>
                        <p class="text-xs text-gray-600 whitespace-pre-line">${item.content}</p>
                    </div>
                `;
            });
        }

        function showError(msg) {
            const errorMsg = document.getElementById("error-msg");
            errorMsg.innerText = msg;
            errorMsg.classList.remove("hidden");
        }

        function logout() {
            window.location.reload();
        }
    </script>
</body>
</html>
