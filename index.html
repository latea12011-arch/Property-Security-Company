<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物業考勤系統 - 員工端</title>
    <script>
        // 🚀 請在此處貼上您的 GAS 部署網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";
        
        let globalEmployeeId = "";
        let globalEmployeeName = "";
        let globalAssignedLocation = ""; 
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center justify-start">

    <div id="login-box" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-auto">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">物業考勤系統 (員工登入)</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">員工工號</label>
                <input type="text" id="empId" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="請輸入工號">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">登入密碼</label>
                <input type="password" id="password" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="請輸入密碼">
            </div>
            <button onclick="login()" id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">登入</button>
        </div>
    </div>

    <div id="main-panel" class="w-full max-w-md space-y-6 hidden">
        
        <div class="bg-white p-6 rounded-2xl shadow-xl flex justify-between items-center">
            <div>
                <h2 id="welcome-title" class="text-xl font-bold text-gray-800">您好</h2>
                <p id="location-tag" class="text-sm text-blue-600 font-medium"></p>
            </div>
            <button onclick="window.location.reload()" class="text-sm bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-300">登出</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl space-y-3">
            <h3 class="font-semibold text-gray-700 flex items-center">📊 已核准假別天數統計 (今年度)</h3>
            <div class="grid grid-cols-2 gap-3 text-sm">
                <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                    <span class="text-gray-500 block text-xs">特休（年假）</span>
                    <span id="stat-leave-annual" class="text-lg font-bold text-blue-600">0 天</span>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-gray-500 block text-xs">事假已請</span>
                    <span id="stat-leave-personal" class="text-lg font-bold text-gray-700">0 天</span>
                </div>
                <div class="bg-red-50/30 p-3 rounded-xl border border-red-100">
                    <span class="text-gray-500 block text-xs">病假已請</span>
                    <span id="stat-leave-sick" class="text-lg font-bold text-red-600">0 天</span>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-gray-500 block text-xs">其他 (公/婚/喪)</span>
                    <span id="stat-leave-other" class="text-lg font-bold text-gray-500">0 天</span>
                </div>
            </div>
            <p class="text-[10px] text-gray-400 text-center">※ 數據僅統計主委或公司「已核准」之假單時數</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl space-y-4">
            <h3 class="font-semibold text-gray-700">📌 即時考勤打卡</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="checkIn('上班')" class="bg-green-500 text-white py-4 rounded-2xl font-bold text-lg shadow-md hover:bg-green-600 transition">上班打卡</button>
                <button onclick="checkIn('下班')" class="bg-amber-500 text-white py-4 rounded-2xl font-bold text-lg shadow-md hover:bg-amber-600 transition">下班打卡</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl space-y-4">
            <h3 class="font-semibold text-gray-700">📅 線上請假申請表單</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">選擇請假假別</label>
                    <select id="leave-type" class="w-full px-3 py-2 border rounded-xl text-sm bg-white">
                        <option value="事假">事假</option>
                        <option value="病假">病假</option>
                        <option value="特休">特休（年假）</option>
                        <option value="婚假/喪假">婚假 / 喪假</option>
                        <option value="公假">公假</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">請假開始日期</label>
                        <input type="date" id="leave-start" class="w-full px-3 py-2 border rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">請假結束日期</label>
                        <input type="date" id="leave-end" class="w-full px-3 py-2 border rounded-xl text-sm">
                    </div>
                </div>
                <button onclick="submitLeave()" id="leave-btn" class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-semibold text-sm hover:bg-blue-700 transition">送出請假申請</button>
                <p id="leave-msg" class="text-sm font-medium text-center mt-1"></p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl space-y-3">
            <h3 class="font-semibold text-gray-700">📢 最新公告</h3>
            <div id="announcement-list" class="space-y-2"></div>
        </div>

    </div>

    <script>
        // 更新統計看板的 UI 函式
        function updateLeaveDashboard(summary) {
            if(!summary) return;
            document.getElementById("stat-leave-annual").innerText = `${summary["特休"] || 0} 天`;
            document.getElementById("stat-leave-personal").innerText = `${summary["事假"] || 0} 天`;
            document.getElementById("stat-leave-sick").innerText = `${summary["病假"] || 0} 天`;
            document.getElementById("stat-leave-other").innerText = `${summary["局外"] || summary["其他"] || 0} 天`;
        }

        async function login() {
            const id = document.getElementById("empId").value.trim();
            const pass = document.getElementById("password").value.trim();
            if(!id || !pass) return;
            
            document.getElementById("login-btn").innerText = "驗證中...";
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", employeeId: id, password: pass })});
                const r = await res.json();
                if(r.success) {
                    globalEmployeeId = id;
                    globalEmployeeName = r.employeeName;
                    globalAssignedLocation = r.assignedLocation;
                    
                    document.getElementById("login-box").classList.add("hidden");
                    document.getElementById("main-panel").classList.remove("hidden");
                    document.getElementById("welcome-title").innerText = `${r.employeeName}，您好`;
                    document.getElementById("location-tag").innerText = `所屬案場：${r.assignedLocation}`;
                    
                    // 渲染公告與統計看板
                    renderAnnouncements(r.announcements);
                    updateLeaveDashboard(r.leaveSummary);
                } else { alert(r.message); }
            } catch(e) { alert("連線失敗"); }
            document.getElementById("login-btn").innerText = "登入";
        }

        async function checkIn(type) {
            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "checkin", employeeId: globalEmployeeId, employeeName: globalEmployeeName, type: type, location: globalAssignedLocation })
                });
                const r = await res.json();
                alert(r.message);
            } catch(e) { alert("打卡連線失敗"); }
        }

        async function submitLeave() {
            const leaveType = document.getElementById("leave-type").value;
            const startDate = document.getElementById("leave-start").value;
            const endDate = document.getElementById("leave-end").value;
            const msgEl = document.getElementById("leave-msg");

            if (!startDate || !endDate) {
                msgEl.className = "text-sm text-red-500 text-center";
                msgEl.innerText = "請填寫完整的請假日期！";
                return;
            }

            document.getElementById("leave-btn").disabled = true;
            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "leave", employeeId: globalEmployeeId, employeeName: globalEmployeeName, leaveType: leaveType, startDate: startDate, endDate: endDate })
                });
                const r = await res.json();
                if (r.success) {
                    msgEl.className = "text-sm text-green-600 text-center";
                    msgEl.innerText = "已成功送出請假申請！";
                    document.getElementById("leave-start").value = "";
                    document.getElementById("leave-end").value = "";
                    
                    // 提交假單後即時更新 UI 看板
                    updateLeaveDashboard(r.leaveSummary);
                } else { alert(r.message); }
            } catch(e) { alert("連線失敗"); }
            document.getElementById("leave-btn").disabled = false;
        }

        function renderAnnouncements(list) {
            const container = document.getElementById("announcement-list");
            container.innerHTML = "";
            if(!list || list.length === 0) { container.innerHTML = `<p class="text-gray-400 text-sm text-center py-2">目前尚無最新公告</p>`; return; }
            list.forEach(item => {
                container.innerHTML += `<div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100"><div class="flex justify-between items-center mb-1"><h4 class="font-bold text-sm text-gray-800">${item.title}</h4><span class="text-xs text-gray-400">${item.date}</span></div><p class="text-xs text-gray-600">${item.content}</p></div>`;
            });
        }
    </script>
</body>
</html>
