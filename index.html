<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物業行動考勤系統</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: #1a1a1a; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:active { opacity: 0.8; }
        .btn-success { background: var(--success); }
        .hidden { display: none; }
        .log-item { background: #eee; padding: 8px; margin: 4px 0; border-radius: 4px; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h2>物業考勤系統登入</h2>
        <input type="text" id="emp-id" placeholder="請輸入員工編號 (如: EMP001)">
        <input type="password" id="emp-pwd" placeholder="請輸入密碼">
        <button onclick="login()">登入系統</button>
        <div id="login-msg" style="color:var(--danger); text-align:center; margin-top:10px;"></div>
    </div>

    <div id="main-view" class="hidden">
        <div class="card" style="background: #e9ecef;">
            <h3 id="welcome-text">歡迎回來</h3>
            <p>固定案場：<span id="assigned-loc" style="font-weight:bold;">-</span></p>
            <button onclick="logout()" style="background:#6c757d; padding: 6px; width: auto; font-size: 12px;">登出</button>
        </div>

        <div class="card">
            <h3>📍 行動定位打卡</h3>
            <select id="punch-type">
                <option value="上班">上班打卡</option>
                <option value="下班">下班打卡</option>
            </select>
            <button class="btn-success" onclick="startPunch()">進行 GPS 定位打卡</button>
            <div id="punch-status" style="margin-top:10px; font-weight:bold; text-align:center;"></div>
        </div>

        <div class="card">
            <h3>📅 我的當月班表</h3>
            <div id="schedule-list">暫無班表資料</div>
        </div>

        <div class="card">
            <h3>🏖️ 線上請假申請</h3>
            <select id="leave-type">
                <option value="事假">事假</option>
                <option value="病假">病假</option>
                <option value="特休">特休</option>
            </select>
            <label>開始日期</label>
            <input type="date" id="leave-start">
            <label>結束日期</label>
            <input type="date" id="leave-end">
            <button onclick="submitLeave()" style="background:#ffc107; color:#212529;">送出請假申請</button>
        </div>
    </div>

    <script>
        // ⚠️ 請把下方網址替換成你剛剛在 Google Apps Script 部署得到的「網頁應用程式 URL」
        const GAS_WEB_APP_URL = "const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";

        // 全域變數，紀錄登入後的員工資訊
        let currentUser = { id: "", name: "", location: "" };

        // 假設定義案場的 GPS 座標 (實務上可從後端抓，這裡先示範比對)
        // 請改成你真實案場的經緯度
        const LOCATION_COARDS = {
            "幸福社區": { lat: 25.033964, lng: 121.564468, radius: 200 },
            "遠東大樓": { lat: 25.040000, lng: 121.500000, radius: 200 }
        };

        // 功能一：登入驗證與資料載入
        async function login() {
            const id = document.getElementById("emp-id").value;
            const pwd = document.getElementById("emp-pwd").value;
            const msg = document.getElementById("login-msg");
            
            if(!id || !pwd) { msg.innerText = "請填寫工號與密碼"; return; }
            msg.innerText = "登入中...";

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", employeeId: id, password: pwd })
                });
                const data = await response.json();

                if (data.success) {
                    currentUser.id = id;
                    currentUser.name = data.employeeName;
                    currentUser.location = data.assignedLocation;

                    // 切換畫面
                    document.getElementById("login-view").classList.add("hidden");
                    document.getElementById("main-view").classList.remove("hidden");
                    document.getElementById("welcome-text").innerText = `你好，${currentUser.name} 📋`;
                    document.getElementById("assigned-loc").innerText = currentUser.location;

                    // 渲染班表 (後端過濾好只屬於他的班表)
                    renderSchedules(data.schedules);
                } else {
                    msg.innerText = data.message;
                }
            } catch (err) {
                msg.innerText = "連線失敗，請檢查網路或 GAS 網址";
            }
        }

        // 渲染班表到畫面上
        function renderSchedules(schedules) {
            const container = document.getElementById("schedule-list");
            if (!schedules || schedules.length === 0) {
                container.innerText = "本月尚無排班紀錄";
                return;
            }
            container.innerHTML = schedules.map(s => 
                `<div class="log-item">📅 <b>${s.date}</b> | ${s.location} (${s.shift})</div>`
            ).join("");
        }

        // 功能二：定位打卡邏輯
        function startPunch() {
            const status = document.getElementById("punch-status");
            status.style.color = "#333";
            status.innerText = "正在定位中，請保持連線...";

            if (!navigator.geolocation) {
                status.innerText = "手機不支援 GPS 定位";
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const uLat = position.coords.latitude;
                const uLng = position.coords.longitude;
                const type = document.getElementById("punch-type").value;

                // 抓取該案場的目標經緯度
                const target = LOCATION_COARDS[currentUser.location];
                if(!target) {
                    status.style.color = "var(--danger)";
                    status.innerText = `打卡失敗：查無【${currentUser.location}】的座標設定`;
                    return;
                }

                // 計算距離
                const distance = getDistance(uLat, uLng, target.lat, target.lng);
                let result = "正常";
                if(distance > target.radius) { result = "範圍外異常"; }

                // 傳送打卡資料去 Google 試算表
                status.innerText = "正在寫入出勤紀錄...";
                const res = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "checkin",
                        employeeId: currentUser.id,
                        employeeName: currentUser.name,
                        type: type,
                        distance: Math.round(distance),
                        result: result
                    })
                });
                const resData = await res.json();

                if(resData.success) {
                    if(result === "正常") {
                        status.style.color = "var(--success)";
                        status.innerHTML = `🎉 打卡成功！<br>距離案場：${Math.round(distance)} 公尺`;
                    } else {
                        status.style.color = "var(--danger)";
                        status.innerHTML = `⚠️ 範圍外打卡！距離案場 ${Math.round(distance)} 公尺，已記錄異常。`;
                    }
                }
            }, () => {
                status.innerText = "定位失敗，請確認手機已開啟 GPS 並允許瀏覽器定位權限。";
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        // 功能三：請假申請
        async function submitLeave() {
            const type = document.getElementById("leave-type").value;
            const start = document.getElementById("leave-start").value;
            const end = document.getElementById("leave-end").value;
            if(!start || !end) { alert("請選擇請假日期"); return; }

            const res = await fetch(GAS_WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "leave",
                    employeeId: currentUser.id,
                    employeeName: currentUser.name,
                    leaveType: type,
                    startDate: start,
                    endDate: end
                })
            });
            const data = await res.json();
            if(data.success) {
                alert(data.message);
            }
        }

        // 輔助：計算地球表面兩點距離 (公尺)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
