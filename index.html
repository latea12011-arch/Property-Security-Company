<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物業考勤系統 - 員工端</title>
    <script>
        // 🚀 替換為你最新的 GAS 部署網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";
        
        let globalEmployeeId = "";
        let globalEmployeeName = "";
        let globalAssignedLocation = ""; 
        let globalTotalAnnualLeave = 0;
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center justify-start">

    <!-- 登入卡片 -->
    <div id="login-box" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-auto">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">物業考勤系統 (員工登入)</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">員工工號</label>
                <input type="text" id="empId" class="w-full px-4 py-3 border rounded-xl" placeholder="請輸入工號">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">登入密碼</label>
                <input type="password" id="password" class="w-full px-4 py-3 border rounded-xl" placeholder="請輸入密碼">
            </div>
            <button onclick="login()" id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold">登入</button>
        </div>
    </div>

    <!-- 員工操作主面板 -->
    <div id="main-panel" class="w-full max-w-md space-y-4 hidden">
        
        <!-- 員工資訊 Header (模仿截圖樣式) -->
        <div class="bg-[#E6EBEF] p-4 rounded-lg flex justify-between items-start text-gray-800">
            <div>
                <p class="text-sm">歡迎，<span id="welcome-name" class="font-bold"></span></p>
                <p class="text-sm mt-1">今日指派案場：<span id="location-tag" class="font-bold"></span></p>
                <p class="text-xs text-gray-500 mt-1">系統偵測到職日：<span id="hire-date-tag"></span></p>
            </div>
            <button onclick="window.location.reload()" class="text-xs bg-white text-gray-600 px-2 py-1 rounded shadow-sm">登出</button>
        </div>

        <!-- 假單專區 -->
        <div class="bg-white p-5 rounded-xl shadow-md space-y-4">
            
            <!-- 📊 黃色累計看板 (完美復刻) -->
            <div class="bg-[#FFF8D6] rounded-lg p-4 border border-yellow-200">
                <h3 class="font-bold text-gray-800 text-sm border-b border-dashed border-yellow-400 pb-2 mb-3 flex items-center">
                    📊 今年度已請假累計 (含待審核)
                </h3>
                <div class="space-y-2 text-sm text-gray-800 font-medium">
                    <p>📌 事假：<span id="stat-leave-personal" class="text-red-600">0天0小時</span> / 上限 14 天</p>
                    <p>📌 病假：<span id="stat-leave-sick" class="text-red-600">0天0小時</span> / 上限 30 天</p>
                    <p>📌 特休：<span id="stat-leave-annual" class="text-red-600">0天0小時</span> / 依年資您有 <span id="stat-annual-total" class="text-blue-600 font-bold">0</span> 天</p>
                    <p>📌 婚假：<span id="stat-leave-marriage" class="text-red-600">0天0小時</span> / 上限 8 天</p>
                    <p>📌 喪假：<span id="stat-leave-bereavement" class="text-red-600">0天0小時</span> / 上限 8 天</p>
                </div>
                <p class="text-[11px] text-gray-500 mt-4 pt-2 border-t border-yellow-300 border-dashed">
                    ※ 假別天數與上限皆依據勞動基準法(第38條特休)及勞工請假規則之相關條文辦理。
                </p>
            </div>

            <!-- 請假表單 -->
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">請假假別</label>
                    <select id="leave-type" class="w-full px-3 py-2 border rounded-lg text-sm bg-white">
                        <option value="事假">事假 (勞基法上限14天)</option>
                        <option value="病假">病假 (勞基法上限30天)</option>
                        <option value="特休">特休 (依年資計算)</option>
                        <option value="婚假">婚假 (勞工請假規則上限8天)</option>
                        <option value="喪假">喪假 (依親屬關係最高8天)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">開始日期</label>
                        <input type="date" id="leave-start" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">結束日期</label>
                        <input type="date" id="leave-end" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                </div>
                <button onclick="submitLeave()" id="leave-btn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold text-sm">送出請假申請</button>
                <p id="leave-msg" class="text-sm font-medium text-center mt-1"></p>
            </div>
        </div>

        <!-- 打卡專區 -->
        <div class="bg-white p-5 rounded-xl shadow-md space-y-4">
            <h3 class="font-bold text-gray-700 border-b pb-2">📌 即時考勤打卡</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="checkIn('上班')" class="bg-green-500 text-white py-3 rounded-lg font-bold shadow hover:bg-green-600">上班打卡</button>
                <button onclick="checkIn('下班')" class="bg-amber-500 text-white py-3 rounded-lg font-bold shadow hover:bg-amber-600">下班打卡</button>
            </div>
        </div>

    </div>

    <script>
        function updateLeaveDashboard(summary) {
            if(!summary) return;
            const fmt = (days) => `${days}天0小時`;
            document.getElementById("stat-leave-personal").innerText = fmt(summary["事假"] || 0);
            document.getElementById("stat-leave-sick").innerText = fmt(summary["病假"] || 0);
            document.getElementById("stat-leave-annual").innerText = fmt(summary["特休"] || 0);
            document.getElementById("stat-leave-marriage").innerText = fmt(summary["婚假"] || 0);
            document.getElementById("stat-leave-bereavement").innerText = fmt(summary["喪假"] || 0);
        }

        async function login() {
            const id = document.getElementById("empId").value.trim();
            const pass = document.getElementById("password").value.trim();
            if(!id || !pass) return;
            
            document.getElementById("login-btn").innerText = "驗證中...";
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", employeeId: id, password: pass })});
                const r = await res.json();
                if(r.success) {
                    globalEmployeeId = id;
                    globalEmployeeName = r.employeeName;
                    globalAssignedLocation = r.assignedLocation;
                    globalTotalAnnualLeave = r.totalAnnualLeave;
                    
                    document.getElementById("login-box").classList.add("hidden");
                    document.getElementById("main-panel").classList.remove("hidden");
                    
                    // 填入 Header 資訊
                    document.getElementById("welcome-name").innerText = r.employeeName;
                    document.getElementById("location-tag").innerText = r.assignedLocation;
                    document.getElementById("hire-date-tag").innerText = r.hireDate;
                    document.getElementById("stat-annual-total").innerText = r.totalAnnualLeave;
                    
                    updateLeaveDashboard(r.leaveSummary);
                } else { alert(r.message); }
            } catch(e) { alert("連線失敗"); }
            document.getElementById("login-btn").innerText = "登入";
        }

        async function checkIn(type) {
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "checkin", employeeId: globalEmployeeId, employeeName: globalEmployeeName, type: type, location: globalAssignedLocation }) });
                const r = await res.json();
                alert(r.message);
            } catch(e) { alert("打卡連線失敗"); }
        }

        async function submitLeave() {
            const leaveTypeRaw = document.getElementById("leave-type").value;
            const startDate = document.getElementById("leave-start").value;
            const endDate = document.getElementById("leave-end").value;
            const msgEl = document.getElementById("leave-msg");

            if (!startDate || !endDate) {
                msgEl.className = "text-sm text-red-500 text-center";
                msgEl.innerText = "請填寫完整的請假日期！";
                return;
            }

            document.getElementById("leave-btn").disabled = true;
            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "leave", employeeId: globalEmployeeId, employeeName: globalEmployeeName, leaveType: leaveTypeRaw, startDate: startDate, endDate: endDate })
                });
                const r = await res.json();
                if (r.success) {
                    msgEl.className = "text-sm text-green-600 text-center";
                    msgEl.innerText = "已成功送出請假申請！";
                    updateLeaveDashboard(r.leaveSummary);
                } else { alert(r.message); }
            } catch(e) { alert("連線失敗"); }
            document.getElementById("leave-btn").disabled = false;
        }
    </script>
</body>
</html>
