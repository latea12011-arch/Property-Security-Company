<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紘嘉物業 - 員工行動考勤與請假系統 (新增請假審核查詢)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; }
    body { background-color: #f4f6f9; color: #333; padding-bottom: 20px; }
    .loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    .spinner { width: 45px; height: 45px; border: 5px solid #f3f3f3; border-top: 5px solid #4e54c8; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .login-container { max-width: 400px; margin: 60px auto; padding: 30px 20px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
    .login-container h2 { color: #4e54c8; margin-bottom: 25px; }
    .main-panel { max-width: 500px; margin: 0 auto; display: none; padding: 15px; }
    .user-card { padding: 20px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; position: relative; background-color: #fff;}
    .logout-btn { position: absolute; top: 20px; right: 20px; background: #ffe3e3; color: #e53e3e; border: none; padding: 8px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .tab-bar { display: flex; justify-content: space-around; background: #e2e8f0; padding: 6px; border-radius: 12px; margin-bottom: 15px; gap: 4px; }
    .tab-btn { flex: 1; padding: 12px 6px; border: none; background: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #4a5568; font-size: 13px; transition: 0.3s; text-align: center; }
    .tab-btn i { display: block; font-size: 16px; margin-bottom: 4px; }
    .tab-btn.active { background: #4e54c8; color: white; }
    .content-section { display: none; background: white; padding: 20px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .content-section.active { display: block; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 6px; color: #4a5568; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 15px; background: #f8fafc; outline: none; }
    .btn-action { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
    .btn-clock-in { background: #27ae60; margin-bottom: 12px; font-size: 18px;}
    .btn-clock-out { background: #f39c12; font-size: 18px;}
    .btn-submit { background: #5c6bc0; }
    .item-row { padding: 12px; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; font-size: 14px; align-items: center; }
    .announcement-box { padding: 15px; background: #fff5f5; border-left: 4px solid #e53e3e; margin-bottom: 12px; border-radius: 6px; }
    .preview-box { width: 100%; max-height: 150px; object-fit: contain; margin-top: 10px; display: none; border-radius: 8px; border: 1px dashed #cbd5e0; }
    
    /* 假單狀態標籤樣式 */
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #fff; }
    .badge-wait { background-color: #f39c12; }
    .badge-pass { background-color: #27ae60; }
    .badge-fail { background-color: #c0392b; }
  </style>
</head>
<body>

  <!-- 讀取遮罩 -->
  <div class="loading-mask" id="globalMask">
    <div class="spinner"></div>
    <p id="maskText" style="font-weight: bold; color: #4e54c8;">安全與雲端核心連線中...</p>
  </div>

  <!-- 【A】登入介面 -->
  <div class="login-container" id="loginBox">
    <h2>紘嘉物業行動考勤</h2>
    <div class="form-group" style="text-align: left;">
      <label>員工工號 (五碼)</label>
      <input type="text" id="empIdInput" placeholder="例如：00001">
    </div>
    <div class="form-group" style="text-align: left;">
      <label>登入密碼</label>
      <input type="password" id="pwdInput" placeholder="請輸入密碼">
    </div>
    <button class="btn-action btn-submit" onclick="executeLogin()">安全登入</button>
  </div>

  <!-- 【B】主控制面板 -->
  <div class="main-panel" id="mainPanel">
    <div class="user-card">
      <h3 id="welcomeTitle">同仁，您好</h3>
      <p style="margin-top: 5px; color: #4e54c8; font-weight: bold;" id="identityTypeDisplay"></p>
      <p style="font-size: 13px; color: #718096; margin-top: 2px;" id="joinDateDisplay"></p>
      <button class="logout-btn" onclick="executeLogout()">登出</button>
    </div>
    
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('clockTab', this)"><i class="fa-solid fa-clock"></i>打卡</button>
      <button class="tab-btn" onclick="loadLeaveTab('leaveTab', this)"><i class="fa-solid fa-pen-to-square"></i>請假</button>
      <button class="tab-btn" onclick="loadScheduleTab('scheduleTab', this)"><i class="fa-solid fa-calendar-days"></i>班表</button>
      <button class="tab-btn" onclick="loadAnnouncementsTab('announceTab', this)"><i class="fa-solid fa-bullhorn"></i>公告</button>
    </div>

    <!-- 1. 打卡 -->
    <div class="content-section active" id="clockTab">
      <div style="margin-bottom: 15px; padding: 12px; background: #edf2f7; border-left: 5px solid #4e54c8; border-radius: 4px;">
        <p style="font-weight: bold; font-size: 14px; color: #4a5568;"><i class="fa-solid fa-location-dot" style="color:#e53e3e; margin-right:5px;"></i> 打卡選取案場</p>
        <div id="locationDisplayArea" style="margin-top: 8px;">載入中...</div>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn-action btn-clock-in" onclick="triggerPunch('clockIn')"><i class="fa-solid fa-sun"></i> 上班打卡</button>
        <button class="btn-action btn-clock-out" onclick="triggerPunch('clockOut')"><i class="fa-solid fa-moon"></i> 下班打卡</button>
      </div>
    </div>

    <!-- 2. 請假 -->
    <div class="content-section" id="leaveTab">
      <h4 style="margin-bottom: 12px; color:#4e54c8;"><i class="fa-solid fa-file-signature"></i> 填寫請假單</h4>
      <div class="form-group">
        <label>選擇假別</label>
        <select id="leaveType">
          <option value="事假">事假</option>
          <option value="病假">病假</option>
          <option value="特休">特休</option>
          <option value="公傷假">公傷假</option>
          <option value="婚假/喪假">婚假/喪假</option>
        </select>
      </div>
      <div class="form-group">
        <label>請假開始時間</label>
        <input type="datetime-local" id="startTime">
      </div>
      <div class="form-group">
        <label>請假結束時間</label>
        <input type="datetime-local" id="endTime">
      </div>
      <div class="form-group">
        <label>上傳證明文件 (病假單/訃聞/診斷證明圖片)</label>
        <input type="file" id="leaveAttachment" accept="image/*" onchange="previewImageFile(this)">
        <img id="imageFilePreview" class="preview-box">
      </div>
      <div class="form-group">
        <label>請假事由 / 備註說明</label>
        <textarea id="leaveReason" rows="3" placeholder="請填寫具體原因..."></textarea>
      </div>
      <button class="btn-action btn-submit" style="margin-bottom: 25px;" onclick="executeLeaveFormSubmit()">送出請假申請</button>
      
      <hr style="border:0; border-top:1px dashed #cbd5e0; margin-bottom: 15px;">
      
      <!-- 新增：個人請假審核進度面板 -->
      <h4 style="margin-bottom: 10px; color:#4e54c8;"><i class="fa-solid fa-clipboard-list"></i> 您的請假審核進度</h4>
      <div id="leaveRecordsContainer" style="background:#f8fafc; border-radius:10px; border:1px solid #e2e8f0; max-height: 250px; overflow-y: auto;">
        <p style="padding:15px; text-align:center; color:#a0aec0;">正在同步審核進度...</p>
      </div>
    </div>

    <!-- 3. 班表 -->
    <div class="content-section" id="scheduleTab">
      <div class="form-group" style="display: flex; gap: 10px; align-items: flex-end;">
        <div style="flex: 1;">
          <label>切換查詢月份</label>
          <select id="scheduleMonthSelect"></select>
        </div>
        <button class="btn-action btn-submit" style="width: auto; padding: 12px 20px;" onclick="fetchMonthlyScheduleData()">查詢</button>
      </div>
      <h4 style="margin-bottom: 10px; color:#4e54c8;"><i class="fa-solid fa-calendar-check"></i> 個人排班班表</h4>
      <div id="scheduleContainer" style="background:#f8fafc; border-radius:10px; border:1px solid #e2e8f0; max-height: 350px; overflow-y: auto;">
        <p style="padding:20px; text-align:center; color:#a0aec0;">請點擊上方查詢</p>
      </div>
    </div>

    <!-- 4. 公告 -->
    <div class="content-section" id="announceTab">
      <h4 style="margin-bottom: 15px; color:#e53e3e;"><i class="fa-solid fa-bullhorn"></i> 管理部最新公告事項</h4>
      <div id="announceContainer" style="max-height: 450px; overflow-y: auto;"></div>
    </div>

  </div>

  <script>
    // 🌟 這裡更換為您的 Google Apps Script「網頁應用程式網址」
    const BASE_GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";

    let currentUser = { empId: "", name: "", identityType: "", assignedLocation: "", allLocations: [] };
    let selectedFileBase64 = "";
    let selectedFileName = "";
    let selectedFileType = "";

    function sendJsonpRequest(url, callbackFunctionName, successHandler) {
      window[callbackFunctionName] = function(data) {
        successHandler(data);
        delete window[callbackFunctionName];
        const scriptTag = document.getElementById(callbackFunctionName);
        if (scriptTag) scriptTag.remove();
      };
      const connector = url.includes("?") ? "&" : "?";
      const finalUrl = `${url}${connector}callback=${callbackFunctionName}&_ts=${new Date().getTime()}`;
      const script = document.createElement("script");
      script.src = finalUrl;
      script.id = callbackFunctionName;
      document.body.appendChild(script);
    }

    function initMonthSelector() {
      const select = document.getElementById("scheduleMonthSelect");
      select.innerHTML = ""; 
      const now = new Date();
      const monthsOffsets = [-1, 0, 1];
      monthsOffsets.forEach(offset => {
        let d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
        let mStr = d.getFullYear() + "年" + String(d.getMonth() + 1).padStart(2, '0') + "月";
        let opt = document.createElement("option");
        opt.value = mStr; 
        opt.innerText = mStr;
        if(offset === 0) { opt.selected = true; }
        select.appendChild(opt);
      });
    }

    function switchTab(tabId, btnElem) {
      document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btnElem.classList.add('active');
    }

    // 當同仁切換到請假頁面時，自動載入他的請假紀錄
    function loadLeaveTab(tabId, btnElem) {
      switchTab(tabId, btnElem);
      fetchLeaveRecordsData();
    }

    // 取得個人請假歷史紀錄與狀態
    function fetchLeaveRecordsData() {
      const container = document.getElementById("leaveRecordsContainer");
      const requestUrl = `${BASE_GAS_URL}?action=fetchLeaveRecords&employeeId=${encodeURIComponent(currentUser.empId)}`;
      
      sendJsonpRequest(requestUrl, "cb_leave_rec_" + Math.floor(Math.random()*100000), function(res) {
        if(res.success && res.records.length > 0) {
          let html = "";
          res.records.forEach(item => {
            let badgeClass = "badge-wait";
            if (item.status === "已核准" || item.status === "核准") badgeClass = "badge-pass";
            if (item.status === "不核准" || item.status === "駁回") badgeClass = "badge-fail";
            
            html += `<div class="item-row">
                      <div>
                        <span style="font-weight:bold; color:#2d3748;">[${item.leaveType}]</span> 
                        <span style="font-size:12px; color:#718096; display:block; margin-top:2px;">${item.start} ~ ${item.end}</span>
                      </div>
                      <span class="badge ${badgeClass}">${item.status}</span>
                    </div>`;
          });
          container.innerHTML = html;
        } else {
          container.innerHTML = `<p style="padding:15px; text-align:center; color:#a0aec0;">查無歷史請假紀錄。</p>`;
        }
      });
    }

    function previewImageFile(input) {
      const file = input.files[0];
      const preview = document.getElementById("imageFilePreview");
      if (file) {
        selectedFileName = file.name; selectedFileType = "image/jpeg";
        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.src = e.target.result;
          img.onload = function () {
            const canvas = document.createElement("canvas");
            let width = img.width; let height = img.height;
            const MAX_WIDTH = 1000; const MAX_HEIGHT = 1000;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext("2d"); ctx.drawImage(img, 0, 0, width, height);
            const compressedBase64 = canvas.toDataURL("image/jpeg", 0.6);
            selectedFileBase64 = compressedBase64; preview.src = compressedBase64; preview.style.display = "block";
          };
        };
        reader.readAsDataURL(file);
      } else {
        selectedFileBase64 = ""; selectedFileName = ""; selectedFileType = ""; preview.style.display = "none";
      }
    }

    function executeLogin() {
      const id = document.getElementById("empIdInput").value.trim();
      const pwd = document.getElementById("pwdInput").value.trim();
      if(!id || !pwd) { alert("請填寫工號與密碼！"); return; }
      
      showMask("正在驗證身份，請稍候...");
      const requestUrl = `${BASE_GAS_URL}?action=login&employeeId=${encodeURIComponent(id)}&password=${encodeURIComponent(pwd)}`;
      sendJsonpRequest(requestUrl, "cb_login_" + Math.floor(Math.random()*100000), function(res) {
        hideMask();
        if(res.success) {
          currentUser.empId = id; currentUser.name = res.employeeName;
          currentUser.identityType = res.identityType; currentUser.assignedLocation = res.assignedLocation;
          currentUser.allLocations = res.allLocations;
          
          document.getElementById("welcomeTitle").innerText = `${res.employeeName} (${id}) 同仁，您好`;
          document.getElementById("identityTypeDisplay").innerText = `💼 身分類別：${res.identityType}`;
          document.getElementById("joinDateDisplay").innerText = `📅 入職日期：${res.joinDate} | 年度特休：${res.annualLeaveTotal} 天`;
          
          const locArea = document.getElementById("locationDisplayArea");
          if(res.identityType === "機動人員") {
            let selectHtml = `<select id="punchLocationSelect" style="font-weight:bold; color:#2d3748; background:#fff; border:1px solid #a0aec0; padding:8px; width:100%; border-radius:6px;">`;
            res.allLocations.forEach(loc => selectHtml += `<option value="${loc}">${loc}</option>`);
            selectHtml += `</select>`; locArea.innerHTML = selectHtml;
          } else {
            locArea.innerHTML = `<span style="font-size:16px; font-weight:bold; color:#2d3748;">🏠 綁定案場：${res.assignedLocation}</span>`;
          }
          initMonthSelector();
          document.getElementById("loginBox").style.display = "none";
          document.getElementById("mainPanel").style.display = "block";
        } else {
          alert(res.message);
        }
      });
    }

    function triggerPunch(actionType) {
      showMask("正在取得 GPS 衛星定位中...");
      let targetLocationName = document.getElementById("punchLocationSelect") ? document.getElementById("punchLocationSelect").value : currentUser.assignedLocation;
      if(!targetLocationName) { hideMask(); alert("未選取有效的打卡案場！"); return; }
      if (!navigator.geolocation) { hideMask(); alert("手機不支援 GPS 定位。"); return; }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude; const lng = position.coords.longitude;
          setMaskText("定位成功，正在比對案場距離範圍...");
          const requestUrl = `${BASE_GAS_URL}?action=${actionType}&employeeId=${encodeURIComponent(currentUser.empId)}&employeeName=${encodeURIComponent(currentUser.name)}&location=${encodeURIComponent(targetLocationName)}&lat=${lat}&lng=${lng}`;
          sendJsonpRequest(requestUrl, "cb_punch_" + Math.floor(Math.random()*100000), function(res) {
            hideMask(); alert(res.message);
          });
        },
        function(error) { hideMask(); alert("定位失敗，請確認已開啟手機 GPS 定位權限。"); },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );
    }

    function executeLeaveFormSubmit() {
      const type = document.getElementById("leaveType").value;
      const start = document.getElementById("startTime").value;
      const end = document.getElementById("endTime").value;
      const reason = document.getElementById("leaveReason").value.trim();

      if(!start || !end || !reason) { alert("請填妥請假時間與事由！"); return; }
      if((type === "病假" || type === "公傷假" || type === "婚假/喪假") && !selectedFileBase64) {
        if(!confirm("您選擇了 " + type + "，建議提供圖片證明，是否確認不加附件直接送出？")) { return; }
      }

      showMask("正在高速同步證明文件至管理部系統...");
      let currentLoc = document.getElementById("punchLocationSelect") ? document.getElementById("punchLocationSelect").value : currentUser.assignedLocation;
      
      const payload = {
        action: "leaveSubmit", employeeId: currentUser.empId, employeeName: currentUser.name,
        location: currentLoc, leaveType: type, start: start, end: end, reason: reason,
        fileName: selectedFileName, fileType: selectedFileType, fileData: selectedFileBase64
      };

      fetch(BASE_GAS_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(response => response.json())
      .then(res => {
        hideMask(); alert(res.message);
        resetLeaveForm(); fetchLeaveRecordsData(); // 送出成功後自動刷新下方進度
      })
      .catch(err => {
        hideMask(); alert("🎉 請假申請已成功送出！證明文件已同步至雲端系統。");
        resetLeaveForm(); fetchLeaveRecordsData();
      });
    }

    function resetLeaveForm() {
      document.getElementById("startTime").value = ""; document.getElementById("endTime").value = ""; 
      document.getElementById("leaveReason").value = ""; document.getElementById("leaveAttachment").value = "";
      document.getElementById("imageFilePreview").style.display = "none";
      selectedFileBase64 = ""; selectedFileName = ""; selectedFileType = "";
    }

    function loadScheduleTab(tabId, btnElem) { switchTab(tabId, btnElem); fetchMonthlyScheduleData(); }

    function fetchMonthlyScheduleData() {
      const targetMonth = document.getElementById("scheduleMonthSelect").value;
      const container = document.getElementById("scheduleContainer");
      container.innerHTML = `<p style="padding:20px; text-align:center; color:#4e54c8;"><i class="fa-solid fa-spinner fa-spin"></i> 讀取班表中...</p>`;
      const requestUrl = `${BASE_GAS_URL}?action=fetchSchedule&employeeId=${encodeURIComponent(currentUser.empId)}&month=${encodeURIComponent(targetMonth)}`;
      sendJsonpRequest(requestUrl, "cb_sched_" + Math.floor(Math.random()*100000), function(res) {
        if(res.success && res.schedule.length > 0) {
          let html = "";
          res.schedule.forEach(item => {
            let shiftColor = item.shift.includes("休") ? "color:#e53e3e; font-weight:bold;" : "color:#27ae60; font-weight:bold;";
            html += `<div class="item-row"><span>📅 ${item.date} 日</span><span style="${shiftColor}">${item.shift}</span></div>`;
          });
          container.innerHTML = html;
        } else { container.innerHTML = `<p style="padding:20px; text-align:center; color:#718096;">⚠️ ${res.message || "當月查無排班"}</p>`; }
      });
    }

    function loadAnnouncementsTab(tabId, btnElem) {
      switchTab(tabId, btnElem);
      const container = document.getElementById("announceContainer");
      container.innerHTML = `<p style="text-align:center; color:#4e54c8; padding:20px;"><i class="fa-solid fa-spinner fa-spin"></i> 載入最新公告...</p>`;
      const requestUrl = `${BASE_GAS_URL}?action=fetchAnnouncements`;
      sendJsonpRequest(requestUrl, "cb_ann_" + Math.floor(Math.random()*100000), function(res) {
        if(res.success && res.announcements.length > 0) {
          let html = "";
          res.announcements.forEach(ann => {
            html += `<div class="announcement-box">
                      <div style="display:flex; justify-content:space-between; font-size:12px; color:#e53e3e; font-weight:bold; margin-bottom:5px;">
                        <span>📢 單位：${ann.unit}</span><span>⏱️ ${ann.date}</span>
                      </div>
                      <p style="font-size:14px; color:#2d3748; line-height:1.5; white-space:pre-line;">${ann.content}</p>
                    </div>`;
          });
          container.innerHTML = html;
        } else { container.innerHTML = `<p style="text-align:center; color:#a0aec0; padding:20px;">目前尚無公告事項。</p>`; }
      });
    }

    function executeLogout() {
      currentUser = { empId: "", name: "", identityType: "", assignedLocation: "", allLocations: [] };
      document.getElementById("empIdInput").value = ""; document.getElementById("pwdInput").value = "";
      document.getElementById("mainPanel").style.display = "none"; document.getElementById("loginBox").style.display = "block";
    }

    function showMask(txt) { document.getElementById("globalMask").style.display = "flex"; setMaskText(txt); }
    function hideMask() { document.getElementById("globalMask").style.display = "none"; }
    function setMaskText(txt) { document.getElementById("maskText").innerText = txt; }
  </script>
</body>
</html>
