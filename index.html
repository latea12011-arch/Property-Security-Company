<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紘嘉物業考勤打卡系統</title>
  
  <script>
    const manifest = {
      "name": "紘嘉物業智慧打卡系統",
      "short_name": "紘嘉打卡",
      "start_url": window.location.href,
      "display": "standalone",
      "background_color": "#4e54c8",
      "theme_color": "#4e54c8",
      "orientation": "portrait",
      "icons": [{ "src": "https://i.meee.com.tw/Q0RaFOE.png", "sizes": "192x192", "type": "image/png" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    // =========================================================================
    // 🌟【耀毅同仁端控制中心】請在此填入最新部署的 GAS 網址：
    // =========================================================================
    const BASE_GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";
  </script>
  
  <style>
    * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 15px; color: #333; }
    .phone-container { width: 100%; max-width: 410px; background: white; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
    .page { display: none; width: 100%; flex-direction: column; gap: 15px; }
    .page.active { display: flex; }
    .logo-area { text-align: center; margin: 20px 0 10px 0; }
    .logo-area i { font-size: 50px; color: #4e54c8; }
    .logo-area h2 { font-size: 22px; margin-top: 10px; color: #2c3e50; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 14px; font-weight: bold; color: #555; }
    .form-control { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e0; border-radius: 12px; font-size: 16px; outline: none; background: #f8fafc; transition: all 0.3s; }
    .form-control:focus { border-color: #4e54c8; box-shadow: 0 0 0 3px rgba(78,84,200,0.1); }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s; }
    .btn-primary { background: #4e54c8; color: white; box-shadow: 0 4px 12px rgba(78,84,200,0.3); }
    .btn-primary:active { transform: scale(0.98); background: #3b41a8; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger { background: #e53e3e; color: white; }
    .btn-secondary { background: #edf2f7; color: #4a5568; }
    .user-banner { background: linear-gradient(135deg, #f6f8fb 0%, #f1f3f8 100%); border: 1px solid #e2e8f0; padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
    .user-info { display: flex; flex-direction: column; gap: 4px; }
    .user-info h3 { font-size: 18px; color: #2d3748; }
    .user-info p { font-size: 13px; color: #718096; display: flex; align-items: center; gap: 6px; }
    .logout-btn { padding: 8px 14px; background: #fff5f5; color: #e53e3e; border: 1px solid #fed7d7; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .clock-box { background: #1a202c; color: white; padding: 20px; border-radius: 18px; text-align: center; display: flex; flex-direction: column; gap: 5px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
    .clock-time { font-size: 34px; font-weight: bold; font-family: monospace; color: #00f2fe; }
    .clock-date { font-size: 14px; color: #a0aec0; letter-spacing: 1px; }
    .punch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .punch-btn { height: 95px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; font-size: 16px; border-radius: 16px; }
    .punch-btn i { font-size: 26px; }
    .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #e2e8f0; padding-top: 10px; margin-top: 10px; gap: 10px; }
    .tab-btn { padding: 10px; background: none; border: none; font-size: 14px; font-weight: bold; color: #718096; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tab-btn.active { color: #4e54c8; }
    .loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999; border-radius: 24px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #4e54c8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .record-card { border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; background: #f8fafc; font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; float: right; }
    .status-wait { background: #feebc8; color: #b7791f; }
    .status-ok { background: #c6f6d5; color: #22543d; }
    .status-no { background: #fed7d7; color: #9b2c2c; }
  </style>
</head>
<body>

  <div class="phone-container">
    <div class="loading-mask" id="mask"><div class="spinner"></div><p id="maskText" style="color:#4e54c8; font-weight:bold;">安全定位通訊中...</p></div>

    <!-- 頁面一：同仁登入 -->
    <div class="page active" id="page-login">
      <div class="logo-area"><i class="fa-solid fa-shield-halved"></i><h2>紘嘉物業考勤打卡</h2></div>
      <div class="form-group"><label><i class="fa-solid fa-user"></i> 同仁編號 (五碼)</label><input type="text" id="loginUser" class="form-control" placeholder="例如: 00021"></div>
      <div class="form-group"><label><i class="fa-solid fa-lock"></i> 登入密碼</label><input type="password" id="loginPwd" class="form-control" placeholder="請輸入密碼"></div>
      <button class="btn btn-primary" onclick="submitLogin()"><i class="fa-solid fa-right-to-bracket"></i> 安全登入</button>
    </div>

    <!-- 頁面二：打卡主面板 -->
    <div class="page" id="page-main">
      <div class="user-banner">
        <div class="user-info">
          <h3 id="lblEmpName">同仁</h3>
          <p id="lblIdentity"><i class="fa-solid fa-user-tag"></i> 身分類別 : 讀取中...</p>
          <!-- 🚀 2026 特休解鎖面板位置 -->
          <p id="lblJoinDate" style="font-size:12px; color:#4a5568; font-weight:500; margin-top:2px;"><i class="fa-solid fa-calendar-check"></i> 入職日期 : 讀取中...</p>
        </div>
        <button class="logout-btn" onclick="performLogout()">登出</button>
      </div>

      <div class="clock-box">
        <div class="clock-time" id="liveTime">00:00:00</div>
        <div class="clock-date" id="liveDate">2026年01月01日 星期一</div>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-map-location-dot"></i> 當前值勤案場選擇 :</label>
        <select id="punchLocationSelect" class="form-control"></select>
      </div>

      <div class="punch-grid">
        <button class="btn btn-success punch-btn" onclick="triggerPunch('clockIn')"><i class="fa-solid fa-circle-check"></i><b>上班打卡</b></button>
        <button class="btn btn-danger punch-btn" onclick="triggerPunch('clockOut')"><i class="fa-solid fa-circle-xmark"></i><b>下班打卡</b></button>
      </div>

      <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('main')"><i class="fa-solid fa-fingerprint"></i>即時打卡</button>
        <button class="tab-btn" onclick="switchTab('leave')"><i class="fa-solid fa-file-medical"></i>線上請假申提</button>
      </div>
    </div>

    <!-- 頁面三：請假申提面板 -->
    <div class="page" id="page-leave">
      <div class="user-banner">
        <div><h3 id="lblLeaveEmpName">同仁</h3><p style="font-size:12px; color:#4e54c8;"><i class="fa-solid fa-file-pen"></i> 線上請假條填寫</p></div>
        <button class="logout-btn" onclick="performLogout()">登出</button>
      </div>

      <div style="max-height: 440px; overflow-y: auto; padding-right: 2px; display:flex; flex-direction:column; gap:12px;">
        <div class="form-group"><label>請假類別 :</label><select id="leaveType" class="form-control"><option value="事假">事假 (全扣)</option><option value="病假">病假 (半薪)</option><option value="特休">年度特休假</option><option value="公假">公假 (派訓)</option><option value="婚假/喪假">婚假 / 喪假</option></select></div>
        <div class="form-group"><label>請假開始時間 :</label><input type="datetime-local" id="leaveStart" class="form-control"></div>
        <div class="form-group"><label>請假結束時間 :</label><input type="datetime-local" id="leaveEnd" class="form-control"></div>
        <div class="form-group"><label>上傳證明文件 (病假單/訃聞/診斷證明圖片) :</label><input type="file" id="leaveFile" class="form-control" accept="image/*"></div>
        <div class="form-group"><label>請假事由 / 備註說明 :</label><textarea id="leaveReason" class="form-control" rows="3" placeholder="請填寫具體原因..."></textarea></div>
        
        <button class="btn btn-primary" onclick="submitLeaveForm()"><i class="fa-solid fa-paper-plane"></i> 送出請假申請</button>
        
        <div style="margin-top: 10px; border-top: 1px dashed #cbd5e0; padding-top: 15px;">
          <h4 style="font-size:14px; font-weight:bold; margin-bottom:8px; color:#4e54c8;"><i class="fa-solid fa-clock-rotate-left"></i> 您的請假審核進度</h4>
          <div id="leaveHistoryContainer"><p style="font-size:13px; text-align:center; color:#718096; padding:10px;">查無歷史請假紀錄。</p></div>
        </div>
      </div>

      <div class="nav-tabs">
        <button class="tab-btn" onclick="switchTab('main')"><i class="fa-solid fa-fingerprint"></i>即時打卡</button>
        <button class="tab-btn active" onclick="switchTab('leave')"><i class="fa-solid fa-file-medical"></i>線上請假申提</button>
      </div>
    </div>

  </div>

  <script>
    let currentEmployeeId = ""; let currentEmployeeName = ""; let currentIdentityType = ""; let currentAssignedLoc = "";
    
    // 🌟 2026年最新勞基法年度特休自動精算器
    function calculate2026SpecialLeave(joinDateStr) {
      if(!joinDateStr || joinDateStr === "未填") return 0;
      try {
        let joinDate = new Date(joinDateStr);
        if(isNaN(joinDate.getTime())) return 0;
        
        // 鎖定現在時間為 2026 年
        let currentDate = new Date("2026-07-10"); 
        let diffTime = currentDate.getTime() - joinDate.getTime();
        let diffYears = diffTime / (1000 * 60 * 60 * 24 * 365.25);
        
        if (diffYears < 0.5) return 0;
        if (diffYears >= 0.5 && diffYears < 1) return 3;
        if (diffYears >= 1 && diffYears < 2) return 7;
        if (diffYears >= 2 && diffYears < 3) return 10;
        if (diffYears >= 3 && diffYears < 5) return 14;
        if (diffYears >= 5 && diffYears < 10) return 15;
        
        let years = Math.floor(diffYears);
        let leaves = 15 + (years - 9);
        return leaves > 30 ? 30 : leaves;
      } catch(e) { return 0; }
    }

    function submitLogin() {
      let rawId = document.getElementById("loginUser").value.trim(); if(!rawId) { alert("請輸入同仁工號！"); return; }
      currentEmployeeId = ("00000" + rawId).slice(-5);
      let pwd = document.getElementById("loginPwd").value.trim();
      
      showMask("正在進行紘嘉物業安全身份識別...");
      const url = `${BASE_GAS_URL}?action=login&employeeId=${currentEmployeeId}&password=${encodeURIComponent(pwd)}`;
      sendJsonpRequest(url, "cb_emp_login_" + Math.floor(Math.random()*100000), function(res) {
        hideMask();
        if(res.success) {
          currentEmployeeName = res.employeeName;
          currentIdentityType = res.identityType || "正職人員";
          currentAssignedLoc = res.assignedLocation || "";
          
          document.getElementById("lblEmpName").innerText = `${currentEmployeeName} (${currentEmployeeId})`;
          document.getElementById("lblLeaveEmpName").innerText = `${currentEmployeeName} (${currentEmployeeId})`;
          document.getElementById("lblIdentity").innerHTML = `<i class="fa-solid fa-user-tag"></i> 身分類別 : <b>${currentIdentityType}</b>`;
          
          // 🚀 執行 2026 特休大咬合精算
          let sJoin = res.joinDate ? res.joinDate : "未填";
          let totalLeaveDays = calculate2026SpecialLeave(sJoin);
          document.getElementById("lblJoinDate").innerHTML = `<i class="fa-solid fa-calendar-check"></i> 入職日期 : <b>${sJoin}</b> | 年度特休 : <b style="color:#27ae60;">${totalLeaveDays} 天</b>`;

          let html = "";
          if(res.allLocations && res.allLocations.length > 0) {
            res.allLocations.forEach(loc => { html += `<option value="${loc}">${loc}</option>`; });
          } else if(currentAssignedLoc) {
            html += `<option value="${currentAssignedLoc}">${currentAssignedLoc}</option>`;
          } else { html += `<option value="">-- 目前無指派案場 --</option>`; }
          document.getElementById("punchLocationSelect").innerHTML = html;
          
          document.getElementById("page-login").classList.remove("active");
          document.getElementById("page-main").classList.add("active");
          startClock();
        } else { alert(res.message); }
      });
    }

    function triggerPunch(type) {
      let loc = document.getElementById("punchLocationSelect").value; if(!loc) { alert("❌ 失敗：您目前未被分配 any 案場值勤！"); return; }
      showMask("安全防線 GPS 精準定位通訊中...");
      navigator.geolocation.getCurrentPosition(function(pos) {
        let lat = pos.coords.latitude; let lng = pos.coords.longitude;
        const url = `${BASE_GAS_URL}?action=${type}&employeeId=${currentEmployeeId}&employeeName=${encodeURIComponent(currentEmployeeName)}&location=${encodeURIComponent(loc)}&lat=${lat}&lng=${lng}`;
        sendJsonpRequest(url, "cb_punch_" + Math.floor(Math.random()*100000), function(res) {
          hideMask(); alert(res.message);
        });
      }, function() { hideMask(); alert("❌ 打卡失敗！請允許手機瀏覽器開啟「GPS 定位權限」！"); }, { enableHighAccuracy: true, timeout: 8000 });
    }

    function submitLeaveForm() {
      let type = document.getElementById("leaveType").value;
      let start = document.getElementById("leaveStart").value;
      let end = document.getElementById("leaveEnd").value;
      let reason = document.getElementById("leaveReason").value.trim();
      let loc = document.getElementById("punchLocationSelect").value || "未知案場";
      if(!start || !end || !reason) { alert("❌ 請完整填寫請假起迄時間與事由！"); return; }
      
      let fileInput = document.getElementById("leaveFile");
      if(fileInput.files.length > 0) {
        showMask("正在高安全壓縮並加密證明文件...");
        let file = fileInput.files[0]; let reader = new FileReader();
        reader.onload = function(e) {
          executeLeavePost({ action: "leaveSubmit", employeeId: currentEmployeeId, employeeName: currentEmployeeName, location: loc, leaveType: type, start: start.replace("T"," "), end: end.replace("T"," "), reason: reason, fileData: e.target.result, fileName: file.name, fileType: file.type });
        };
        reader.readAsDataURL(file);
      } else {
        showMask("請假單發送前提報中...");
        executeLeavePost({ action: "leaveSubmit", employeeId: currentEmployeeId, employeeName: currentEmployeeName, location: loc, leaveType: type, start: start.replace("T"," "), end: end.replace("T"," "), reason: reason, fileData: "", fileName: "", fileType: "" });
      }
    }

    function executeLeavePost(payload) {
      fetch(BASE_GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(payload) })
      .then(r => r.json()).then(res => { hideMask(); alert(res.message); if(res.success) { resetLeaveInputs(); fetchLeaveHistoryLogs(); } })
      .catch(() => { hideMask(); alert("🎉 請假單提報成功！已安全送達管理部審核中。"); resetLeaveInputs(); fetchLeaveHistoryLogs(); });
    }

    function fetchLeaveHistoryLogs() {
      const container = document.getElementById("leaveHistoryContainer"); if(!container) return;
      const url = `${BASE_GAS_URL}?action=fetchLeaveRecords&employeeId=${currentEmployeeId}`;
      sendJsonpRequest(url, "cb_hist_" + Math.floor(Math.random()*100000), function(res) {
        if(res.success && res.records && res.records.length > 0) {
          let html = "";
          res.records.forEach(r => {
            let badgeClass = r.status === '已核准' ? 'status-ok' : (r.status === '駁回' ? 'status-no' : 'status-wait');
            html += `<div class="record-card"><span class="status-badge ${badgeClass}">${r.status}</span><b>${r.leaveType}</b><br><span style="font-size:12px; color:#718096;">${r.start} ~ ${r.end}</span><br><span style="color:#4a5568; font-size:13px; margin-top:3px; display:block;">事由: ${r.reason}</span></div>`;
          });
          container.innerHTML = html;
        } else { container.innerHTML = `<p style="font-size:13px; text-align:center; color:#718096; padding:10px;">目前尚無 any 歷史請假申請紀錄。</p>`; }
      });
    }

    function resetLeaveInputs() { document.getElementById("leaveStart").value = ""; document.getElementById("leaveEnd").value = ""; document.getElementById("leaveReason").value = ""; document.getElementById("leaveFile").value = ""; }
    function showMask(text) { document.getElementById("maskText").innerText = text; document.getElementById("mask").style.display = "flex"; }
    function hideMask() { document.getElementById("mask").style.display = "none"; }
    function performLogout() { location.reload(); }
    function switchTab(tabId) { document.getElementById("page-main").classList.remove("active"); document.getElementById("page-leave").classList.remove("active"); document.getElementById("page-" + tabId).classList.add("active"); if(tabId === 'leave') fetchLeaveHistoryLogs(); }
    function sendJsonpRequest(url, callbackName, successHandler) { window[callbackName] = function(data) { successHandler(data); delete window[callbackName]; const script = document.getElementById(callbackName); if(script) script.remove(); }; const script = document.createElement("script"); script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName + "&_ts=" + new Date().getTime(); script.id = callbackName; document.body.appendChild(script); }
    function startClock() { setInterval(() => { const now = new Date(); document.getElementById("liveTime").innerText = now.toTimeString().split(" ")[0]; const w = ["日","一","二","三","四","五","六"]; document.getElementById("liveDate").innerText = `${now.getFullYear()}年${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日 星期${w[now.getDay()]}`; }, 1000); }
  </script>
</body>
</html>
