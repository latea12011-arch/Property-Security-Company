<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紘嘉物業保全 - 智慧管理系統</title>
  <style>
    :root { --primary-color: #4f46e5; --success-color: #10b981; --bg-color: #f3f4f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: #333; padding: 12px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 480px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 20px; min-height: 500px; }
    h2 { text-align: center; margin-bottom: 20px; color: #1f2937; font-size: 20px; font-weight: bold; }
    .tab-group { display: flex; background: #e5e7eb; border-radius: 8px; padding: 3px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 14px; color: #4b5563; }
    .tab-btn.active { background: white; color: var(--primary-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .panel { display: none; }
    .panel.active { display: block; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #4b5563; margin-bottom: 5px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    button.btn-block { width: 100%; padding: 13px; border: none; border-radius: 8px; background: var(--primary-color); color: white; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }
    button.btn-block:hover { background: #4338ca; }
    .info-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; }
    .clock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .btn-clock-in { background: #10b981; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    .btn-clock-out { background: #ef4444; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    .history-title { font-weight: bold; margin-top: 15px; color: #374151; font-size: 14px; border-left: 3px solid var(--primary-color); padding-left: 6px; margin-bottom: 8px; }
    .log-list { max-height: 200px; overflow-y: auto; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; padding: 5px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 8px; border-bottom: 1px solid #edf2f7; }
    .log-item:last-child { border-bottom: none; }
    .badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; }
    .badge-in { background: #e6fffa; color: #047481; }
    .badge-out { background: #fde8e8; color: #c81e1e; }
    .announcement-item { background: #fffbeb; border: 1px solid #fef3c7; border-radius: 6px; padding: 8px; margin-bottom: 8px; font-size: 12px; }
    .btn-review { padding: 4px 8px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 4px; }
  </style>
</head>
<body>

<div class="container">
  <h2>紘嘉物業保全管理系統</h2>
  
  <div class="tab-group" id="mainTabs">
    <button class="tab-btn active" onclick="switchTab('employee')">員工端</button>
    <button class="tab-btn" onclick="switchTab('committee')">主委端</button>
  </div>

  <div id="employeePanel" class="panel active">
    <div id="empLoginForm">
      <div class="form-group">
        <label>員工編號</label>
        <input type="text" id="empId" placeholder="請輸入您的員工編號">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="empPassword" placeholder="請輸入密碼">
      </div>
      <button class="btn-block" onclick="handleEmployeeLogin()">登入員工系統</button>
    </div>

    <div id="empMainZone" style="display:none;">
      <div class="info-box">
        <strong>姓名：</strong><span id="showEmpName">--</span><br>
        <strong>入職日期：</strong><span id="showHireDate">--</span><br>
        <strong>勞基法特休：</strong>總共 <span id="showLeaveTotal">0</span> 天 (剩餘 <span id="showLeaveRemaining">0</span> 天)<br>
        <strong>負責案場：</strong><span id="showEmpLocation">--</span>
      </div>
      
      <div class="history-title">📢 佈告欄最新公告</div>
      <div id="announcementBox" style="margin-bottom: 15px;"></div>

      <div class="history-title">📍 線上 GPS 定位打卡</div>
      <div class="form-group" style="margin-top:5px;">
        <label>選擇目前打卡案場</label>
        <select id="empLocationSelect"></select>
      </div>
      <div class="clock-grid">
        <button class="btn-clock-in" onclick="handleClock('clockIn')">上班打卡</button>
        <button class="btn-clock-out" onclick="handleClock('clockOut')">下班打卡</button>
      </div>

      <div class="history-title">🌴 線上請假申請</div>
      <div class="form-group" style="margin-top:5px;">
        <label>假別</label>
        <select id="leaveType">
              <option value="事假">事假 (勞基法上限14天)</option>
              <option value="病假">病假 (勞基法上限30天)</option>
              <option value="公假">公假 (依公司規定請假)</option>
              <option value="婚假">婚假 (勞基法上限08天)</option>
              <option value="喪假">喪假 (勞基法上限08天)</option>
              <option value="特休">特休 (依同仁年資計算)</option>
        </select>
      </div>
      <div class="form-group">
        <label>開始時間</label>
        <input type="datetime-local" id="leaveStart">
      </div>
      <div class="form-group">
        <label>結束時間</label>
        <input type="datetime-local" id="leaveEnd">
      </div>
      <button class="btn-block" style="background:#6b7280;" onclick="handleLeaveSubmit()">送出請假申請</button>

      <div class="history-title">📅 歷史班表與打卡紀錄 (含當月共3個月)</div>
      <div class="log-list" id="empHistoryList">
        <div style="text-align:center;color:#9ca3af;padding:10px;font-size:12px;">尚無打卡歷史紀錄</div>
      </div>
    </div>
  </div>

  <div id="committeePanel" class="panel">
    <div id="commLoginForm">
      <div class="form-group">
        <label>主委管理帳號</label>
        <input type="text" id="commUser" placeholder="請輸入社區管理帳號">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="commPassword" placeholder="請輸入密碼">
      </div>
      <button class="btn-block" style="background:#4f46e5;" onclick="handleCommitteeLogin()">登入管理後台</button>
    </div>

    <div id="commMainZone" style="display:none;">
      <div class="info-box" style="background:#eeebff; border-color:#dcd7ff;">
        <strong>歡迎主委：</strong><span id="showCommName">--</span><br>
        <strong>管轄社區：</strong><span id="showCommLocation">--</span>
      </div>

      <div class="history-title">📊 社區人員歷史班表紀錄 (含當月共2個月)</div>
      <div class="log-list" id="commAttendanceList" style="max-height: 250px;">
        <div style="text-align:center;color:#9ca3af;padding:10px;font-size:12px;">目前無任何人員打卡紀錄</div>
      </div>

      <div class="history-title">📩 待審核請假流程</div>
      <div class="log-list" id="commLeaveList">
        <div style="text-align:center;color:#9ca3af;padding:10px;font-size:12px;">暫無請假審核申請</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ⚠️ 請換上您最新部署的 GAS 網址 (/exec 結尾)
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec"; 

  let currentEmployeeData = null;

  function switchTab(target) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    if(target === 'employee') {
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('employeePanel').classList.add('active');
    } else {
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
      document.getElementById('committeePanel').classList.add('active');
    }
  }

  // 員工登入
  function handleEmployeeLogin() {
    const id = document.getElementById('empId').value.trim();
    const pw = document.getElementById('empPassword').value.trim();
    if(!id || !pw) return alert("請輸入員工編號與密碼");

    fetch(`${GAS_WEB_APP_URL}?action=login&employeeId=${encodeURIComponent(id)}&password=${encodeURIComponent(pw)}`)
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          currentEmployeeData = data;
          document.getElementById('empLoginForm').style.display = 'none';
          document.getElementById('empMainZone').style.display = 'block';
          
          document.getElementById('showEmpName').innerText = data.employeeName;
          document.getElementById('showHireDate').innerText = data.hireDate;
          document.getElementById('showLeaveTotal').innerText = data.annualLeaveTotal;
          document.getElementById('showLeaveRemaining').innerText = data.annualLeaveRemaining;
          document.getElementById('showEmpLocation').innerText = data.assignedLocation;

          const annBox = document.getElementById('announcementBox');
          annBox.innerHTML = data.announcements.length ? "" : "<div style='font-size:12px;color:#9ca3af;'>暫無最新公告</div>";
          data.announcements.forEach(a => {
            annBox.innerHTML += `<div class="announcement-item"><strong>[${a.date}] ${a.title}</strong><br>${a.content}</div>`;
          });

          const select = document.getElementById('empLocationSelect');
          select.innerHTML = "";
          if(data.isRoamingUser) {
            data.allLocations.forEach(loc => {
              select.innerHTML += `<option value="${loc}">${loc} (機動支援)</option>`;
            });
          } else {
            select.innerHTML = `<option value="${data.assignedLocation}">${data.assignedLocation}</option>`;
          }

          const histList = document.getElementById('empHistoryList');
          histList.innerHTML = data.historyLogs.length ? "" : "<div style='text-align:center;color:#9ca3af;padding:10px;font-size:12px;'>尚無打卡歷史紀錄</div>";
          data.historyLogs.forEach(log => {
            const isClickIn = log.type === "上班";
            histList.innerHTML += `
              <div class="log-item">
                <span>🟢 ${log.location}</span>
                <span>${log.time}</span>
                <span class="badge ${isClickIn ? 'badge-in' : 'badge-out'}">${log.type}</span>
              </div>`;
          });
        } else {
          alert(data.message);
        }
      }).catch(() => alert("系統連線失敗，請檢查網路或網址。"));
  }

  // 員工 GPS 打卡
  function handleClock(actionType) {
    if(!currentEmployeeData) return;
    const chosenLocation = document.getElementById('empLocationSelect').value;
    if(!navigator.geolocation) return alert("您的手機不支援或未開啟 GPS 定位功能");
    
    alert("正在取得您的 GPS 衛星定位座標，請稍候...");
    navigator.geolocation.getCurrentPosition((pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      
      const url = `${GAS_WEB_APP_URL}?action=${actionType}` +
                  `&employeeId=${encodeURIComponent(document.getElementById('empId').value)}` +
                  `&employeeName=${encodeURIComponent(currentEmployeeData.employeeName)}` +
                  `&location=${encodeURIComponent(chosenLocation)}` +
                  `&lat=${lat}&lng=${lng}`;
                  
      fetch(url).then(res => res.json()).then(data => {
        alert(data.message);
        if(data.success) { handleEmployeeLogin(); }
      });
    }, () => alert("❌ 無法取得 GPS 座標，請確認瀏覽器及手機已允許定位權限。"), { enableHighAccuracy: true, timeout: 8000 });
  }

  // 員工請假
  function handleLeaveSubmit() {
    const type = document.getElementById('leaveType').value;
    const start = document.getElementById('leaveStart').value;
    const end = document.getElementById('leaveEnd').value;
    if(!start || !end) return alert("請填寫完整的請假起訖時間！");

    const url = `${GAS_WEB_APP_URL}?action=submitLeave` +
                `&employeeId=${encodeURIComponent(document.getElementById('empId').value)}` +
                `&employeeName=${encodeURIComponent(currentEmployeeData.employeeName)}` +
                `&location=${encodeURIComponent(currentEmployeeData.assignedLocation)}` +
                `&leaveType=${encodeURIComponent(type)}` +
                `&startTime=${start}&endTime=${end}`;
    fetch(url).then(res => res.json()).then(data => {
      alert(data.message);
      if(data.success) { handleEmployeeLogin(); }
    });
  }

  // 主委端登入
  function handleCommitteeLogin() {
    const user = document.getElementById('commUser').value.trim();
    const pw = document.getElementById('commPassword').value.trim();
    if(!user || !pw) return alert("請輸入管理帳號與密碼");

    fetch(`${GAS_WEB_APP_URL}?action=committeeLogin&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pw)}`)
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          document.getElementById('commLoginForm').style.display = 'none';
          document.getElementById('commMainZone').style.display = 'block';
          document.getElementById('showCommName').innerText = data.committeeName;
          document.getElementById('showCommLocation').innerText = data.location;

          // 渲染含當月共 2 個月該案場的人員歷史班表紀錄
          const attList = document.getElementById('commAttendanceList');
          attList.innerHTML = data.attendance.length ? "" : "<div style='text-align:center;color:#9ca3af;padding:10px;font-size:12px;'>目前無任何人員打卡紀錄</div>";
          data.attendance.forEach(log => {
            const isClickIn = log.type === "上班";
            attList.innerHTML += `
              <div class="log-item">
                <strong>👤 ${log.name}</strong>
                <span>${log.time}</span>
                <span class="badge ${isClickIn ? 'badge-in' : 'badge-out'}">${log.type}</span>
              </div>`;
          });

          // 渲染假單審核清單（含功能按鈕）
          renderCommitteeLeaves(data.leaves);
        } else {
          alert(data.message);
        }
      });
  }

  // 渲染主委假單清單與審核按鈕邏輯
  function renderCommitteeLeaves(leaves) {
    const lvList = document.getElementById('commLeaveList');
    lvList.innerHTML = leaves.length ? "" : "<div style='text-align:center;color:#9ca3af;padding:10px;font-size:12px;'>暫無請假審核申請</div>";
    
    leaves.forEach(lv => {
      let actionHtml = `<span style="color:#10b981;font-weight:bold;">${lv.status}</span>`;
      
      // 如果狀態是待審核，才顯示「核准」與「拒絕」按鈕
      if(lv.status === "待審核") {
        actionHtml = `
          <div>
            <button class="btn-review" style="background:#10b981;color:white;" onclick="reviewLeave(${lv.rowId}, 'approveLeave')">核准</button>
            <button class="btn-review" style="background:#ef4444;color:white;" onclick="reviewLeave(${lv.rowId}, 'rejectLeave')">拒絕</button>
          </div>
        `;
      } else if(lv.status === "已拒絕") {
        actionHtml = `<span style="color:#ef4444;font-weight:bold;">${lv.status}</span>`;
      }

      lvList.innerHTML += `
        <div class="log-item">
          <div>
            <strong>👤 ${lv.name}</strong> <span style="color:#6b7280;">(${lv.type})</span><br>
            <span style="font-size:11px;color:#9ca3af;">${lv.duration}</span>
          </div>
          ${actionHtml}
        </div>`;
    });
  }

  // 主委點擊審核按鈕
  function reviewLeave(rowId, actionType) {
    const actionName = actionType === 'approveLeave' ? '核准' : '拒絕';
    if(!confirm(`確定要【${actionName}】這張假單嗎？`)) return;

    fetch(`${GAS_WEB_APP_URL}?action=${actionType}&rowId=${rowId}`)
      .then(res => res.json())
      .then(data => {
        alert(data.message);
        if(data.success) {
          handleCommitteeLogin(); // 審核成功後，立刻重新刷網頁清單
        }
      });
  }
</script>
</body>
</html>
