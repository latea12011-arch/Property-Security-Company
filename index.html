<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物業考勤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec"; // 務必填寫
        let currentMode = "emp";

        // 登入驗證與面板切換邏輯
        async function login() {
            const id = document.getElementById("userId").value;
            const pass = document.getElementById("password").value;
            const action = (currentMode === 'emp') ? "login" : "committeeLogin";
            
            const res = await fetch(GAS_URL, { 
                method: "POST", 
                body: JSON.stringify({ action: action, employeeId: id, username: id, password: pass })
            });
            const r = await res.json();
            
            if(r.success) {
                document.getElementById("login-box").classList.add("hidden");
                if(currentMode === 'emp') {
                    document.getElementById("main-panel").classList.remove("hidden");
                    // 填入所有假別詳細資訊
                    document.getElementById("stat-leave-personal").innerText = (r.leaveSummary["事假"] || 0) + "天";
                    document.getElementById("stat-leave-sick").innerText = (r.leaveSummary["病假"] || 0) + "天";
                    document.getElementById("stat-leave-annual").innerText = (r.leaveSummary["特休"] || 0) + "天";
                    document.getElementById("stat-annual-total").innerText = r.totalAnnualLeave;
                    // 渲染公告
                    renderAnnouncements(r.announcements);
                } else {
                    document.getElementById("committee-panel").classList.remove("hidden");
                }
            } else { alert(r.message); }
        }

        function renderAnnouncements(list) {
            const container = document.getElementById("emp-announcement-list");
            container.innerHTML = list.map(item => `
                <div class="border-l-4 border-blue-500 bg-blue-50 p-3 mb-2 rounded shadow-sm">
                    <p class="font-bold text-blue-800">${item.title}</p>
                    <p class="text-xs text-gray-600">${item.content}</p>
                </div>
            `).join('');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex flex-col items-center">

    <div id="login-box" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-auto">
        <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">物業考勤系統</h2>
        <div class="flex mb-6 bg-gray-200 p-1 rounded-lg">
            <button onclick="currentMode='emp'; this.className='w-1/2 bg-white shadow py-2 rounded-lg font-bold text-blue-600'; document.getElementById('tab-com').className='w-1/2 py-2 text-gray-600'" class="w-1/2 bg-white shadow py-2 rounded-lg font-bold text-blue-600">員工</button>
            <button id="tab-com" onclick="currentMode='com'; this.className='w-1/2 bg-white shadow py-2 rounded-lg font-bold text-blue-600'; document.querySelector('button').className='w-1/2 py-2 text-gray-600'" class="w-1/2 py-2 text-gray-600">主委</button>
        </div>
        <input type="text" id="userId" placeholder="帳號" class="w-full p-3 mb-3 border rounded-xl">
        <input type="password" id="password" placeholder="密碼" class="w-full p-3 mb-4 border rounded-xl">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">登入系統</button>
    </div>

    <div id="main-panel" class="w-full max-w-md hidden space-y-6">
        <div class="bg-[#FFF8D6] p-5 rounded-2xl shadow-md border border-yellow-200">
            <h3 class="font-bold text-gray-800 mb-3 border-b border-yellow-300 pb-2">📋 今年已請假累計</h3>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <p>📌 事假：<span id="stat-leave-personal" class="font-bold text-red-600">0天</span></p>
                <p>📌 病假：<span id="stat-leave-sick" class="font-bold text-red-600">0天</span></p>
                <p>📌 特休：<span id="stat-leave-annual" class="font-bold text-blue-600">0天</span></p>
                <p>📌 特休總額：<span id="stat-annual-total" class="font-bold">0天</span></p>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-md">
            <h3 class="font-bold text-gray-700 mb-3">📢 公司最新公告</h3>
            <div id="emp-announcement-list"></div>
        </div>
    </div>

    <div id="committee-panel" class="w-full max-w-md hidden">
        <div class="bg-gray-800 p-6 rounded-2xl text-white shadow-xl">
            <h2 class="text-xl font-bold">主委管理後台</h2>
            <p class="text-gray-400 text-sm">歡迎管理您的社區考勤與公告</p>
        </div>
    </div>

</body>
</html>
