<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec"; // 務必填寫
        
        async function login() {
            const isCommittee = document.getElementById("login-mode").value === "com";
            const id = document.getElementById("userId").value;
            const pass = document.getElementById("password").value;
            
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: isCommittee ? "committeeLogin" : "login", username: id, password: pass })
            });
            const r = await res.json();
            
            if(r.success) {
                document.getElementById("login-box").classList.add("hidden");
                if(isCommittee) {
                    document.getElementById("committee-panel").classList.remove("hidden");
                } else {
                    document.getElementById("main-panel").classList.remove("hidden");
                    // 恢復您的請假統計與公告
                    document.getElementById("stat-leave-annual").innerText = (r.leaveSummary?.["特休"] || 0) + "天";
                }
            } else { alert(r.message); }
        }
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div id="login-box" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
        <select id="login-mode" class="w-full mb-4 border p-2">
            <option value="emp">員工登入</option>
            <option value="com">主委登入</option>
        </select>
        <input type="text" id="userId" placeholder="帳號" class="w-full mb-2 border p-2">
        <input type="password" id="password" placeholder="密碼" class="w-full mb-4 border p-2">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">登入</button>
    </div>

    <div id="main-panel" class="hidden max-w-md mx-auto space-y-4">
        <div class="bg-[#FFF8D6] p-4 rounded-lg border">
            <p>📌 特休：<span id="stat-leave-annual">0天</span></p>
        </div>
        </div>

    <div id="committee-panel" class="hidden max-w-md mx-auto">
        <div class="bg-gray-800 text-white p-4 rounded">主委管理後台</div>
    </div>
</body>
</html>
