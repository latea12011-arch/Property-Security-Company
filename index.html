<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紘嘉物業保全 - 智慧管理系統</title>
  <style>
    :root { --primary-color: #4f46e5; --success-color: #10b981; --bg-color: #f3f4f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: #333; padding: 12px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 480px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 20px; min-height: 500px; }
    h2 { text-align: center; margin-bottom: 20px; color: #1f2937; font-size: 20px; font-weight: bold; }
    .tab-group { display: flex; background: #e5e7eb; border-radius: 8px; padding: 3px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 14px; color: #4b5563; }
    .tab-btn.active { background: white; color: var(--primary-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .panel { display: none; }
    .panel.active { display: block; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #4b5563; margin-bottom: 5px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    button.btn-block { width: 100%; padding: 13px; border: none; border-radius: 8px; background: var(--primary-color); color: white; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }
    button.btn-block:hover { background: #4338ca; }
    .info-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; }
    .clock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .btn-clock-in { background: #10b981; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    .btn-clock-out { background: #ef4444; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    .history-title { font-weight: bold; margin-top: 15px; color: #374151; font-size: 14px; border-left: 3px solid var(--primary-color); padding-left: 6px; margin-bottom: 8px; }
    .log-list { max-height: 200px; overflow-y: auto; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; padding: 5px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 8px; border-bottom: 1px solid #edf2f7; }
    .badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; }
    .badge-in { background: #e6fffa; color: #047481; }
    .badge-out { background: #fde8e8; color: #c81e1e; }
    .announcement-item { background: #fffbeb; border: 1px solid #fef3c7; border-radius: 6px; padding: 8px; margin-bottom: 8px; font-size: 12px; }
    .download-box { background: #edf2f7; padding: 12px; border-radius: 8px; margin-top: 10px; text-align: center; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-download { background: #4f46e5; color: white; padding: 10px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>紘嘉物業保全管理系統</h2>
  
  <div class="tab-group" id="mainTabs">
    <button class="tab-btn active" onclick="switchTab('employee')">員工端</button>
    <button class="tab-btn" onclick="switchTab('committee')">主委端</button>
  </div>

  <div id="employeePanel" class="panel active">
    <div id="empLoginForm">
      <div class="form-group">
        <label>員工編號</label>
        <input type="text" id="empId" placeholder="請輸入您的員工編號">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="empPassword" placeholder="請輸入密碼">
      </div>
      <button class="btn-block" onclick="handleEmployeeLogin()">登入員工系統</button>
    </div>

    <div id="empMainZone" style="display:none;">
      <div class="info-box">
        <strong>姓名：</strong><span id="showEmpName">--</span><br>
        <strong>負責案場：</strong><span id="showEmpLocation">--</span><br>
        <strong>剩餘特休：</strong><span id="showLeaveRemaining">0</span> 天
      </div>
      
      <div class="history-title">📢 最新公告</div>
      <div id="announcementBox"></div>

      <div class="history-title">📍 線上打卡</div>
      <div class="form-group"><select id="empLocationSelect"></select></div>
      <div class="clock-grid">
        <button class="btn-clock-in" onclick="handleClock('clockIn')">上班打卡</button>
        <button class="btn-clock-out" onclick="handleClock('clockOut')">下班打卡</button>
      </div>

      <div class="history-title">🌴 點選查詢歷史班表紀錄</div>
      <div class="form-group">
        <select id="empMonthQuerySelect" onchange="queryEmployeeHistory()">
          <option value="0">📅 查詢：本月班表紀錄</option>
          <option value="1">📅 查詢：上個月班表紀錄</option>
          <option value="2">📅 查詢：前兩個月班表紀錄</option>
        </select>
      </div>
      <div class="log-list" id="empHistoryList"></div>

      <div class="history-title">🌴 我的請假審核狀態查閱</div>
      <div class="log-list" id="empLeaveStatusList"></div>

      <div class="history-title">✍️ 線上請假申請</div>
      <div class="form-group"><select id="leaveType"><option value="事假">事假</option><option value="病假">病假</option><option value="特休">特休</option></select></div>
      <div class="form-group"><input type="datetime-local" id="leaveStart"></div>
      <div class="form-group"><input type="datetime-local" id="leaveEnd"></div>
      <button class="btn-block" style="background:#6b7280;" onclick="handleLeaveSubmit()">送出請假申請</button>
    </div>
  </div>

  <div id="committeePanel" class="panel">
    <div id="commLoginForm">
      <div class="form-group"><label>主委管理帳號</label><input type="text" id="commUser" placeholder="管理帳號"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="commPassword" placeholder="密碼"></div>
      <button class="btn-block" onclick="handleCommitteeLogin()">登入管理後台</button>
    </div>

    <div id="commMainZone" style="display:none;">
      <div class="info-box" style="background:#eeebff;">
        <strong>歡迎主委：</strong><span id="showCommName">--</span><br>
        <strong>管轄社區：</strong><span id="showCommLocation">--</span>
      </div>

      <div class="history-title">📥 下載社區排班表檔案</div>
      <div class="download-box">
        <button class="btn-download" onclick="downloadReport(0)">📥 下載當月排班表</button>
        <button class="btn-download" style="background:#312e81;" onclick="downloadReport(1)">📥 下載前一月排班表</button>
      </div>

      <div class="history-title">📊 社區人員當月打卡速覽</div>
      <div class="log-list" id="commAttendanceList"></div>

      <div class="history-title">📩 社區同仁請假審核狀態查閱</div>
      <div class="log-list" id="commLeaveList"></div>
    </div>
  </div>
</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec"; 
  let currentEmployeeData = null;
  let committeeLocation = "";

  function switchTab(target) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    if(target === 'employee') {
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('employeePanel').classList.add('active');
    } else {
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
      document.getElementById('committeePanel').classList.add('active');
    }
  }

  function handleEmployeeLogin() {
    const id = document.getElementById('empId').value.trim();
    const pw = document.getElementById('empPassword').value.trim();
    if(!id || !pw) return alert("請輸入員工編號與密碼");

    fetch(`${GAS_WEB_APP_URL}?action=login&employeeId=${encodeURIComponent(id)}&password=${encodeURIComponent(pw)}`)
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          currentEmployeeData = data;
          document.getElementById('empLoginForm').style.display = 'none';
          document.getElementById('empMainZone').style.display = 'block';
          document.getElementById('showEmpName').innerText = data.employeeName;
          document.getElementById('showEmpLocation').innerText = data.assignedLocation;
          document.getElementById('showLeaveRemaining').innerText = data.annualLeaveRemaining;

          // 渲染公告
          const annBox = document.getElementById('announcementBox');
          annBox.innerHTML = data.announcements.length ? "" : "<div style='font-size:12px;color:#9ca3af;'>暫無最新公告</div>";
          data.announcements.forEach(a => { annBox.innerHTML += `<div class="announcement-item"><strong>[${a.date}] ${a.title}</strong><br>${a.content}</div>`; });

          // 打卡案場選項
          const select = document.getElementById('empLocationSelect');
          select.innerHTML = data.isRoamingUser ? data.allLocations.map(l => `<option value="${l}">${l} (機動支援)</option>`).join('') : `<option value="${data.assignedLocation}">${data.assignedLocation}</option>`;

          // 載入預設當月歷史班表
          queryEmployeeHistory();

          // 渲染員工本人的請假狀態
          renderLeaveStatusList('empLeaveStatusList', data.leaves);
        } else { alert(data.message); }
      });
  }

  // 員工切換選單查詢特定月份歷史班表
  function queryEmployeeHistory() {
    if(!currentEmployeeData) return;
    const monthsAgo = document.getElementById('empMonthQuerySelect').value;
    const empId = document.getElementById('empId').value.trim();
    const histList = document.getElementById('empHistoryList');
    histList.innerHTML = "<div style='text-align:center;padding:10px;font-size:12px;color:#9ca3af;'>載入紀錄中...</div>";

    fetch(`${GAS_WEB_APP_URL}?action=fetchEmployeeHistory&employeeId=${encodeURIComponent(empId)}&monthsAgo=${monthsAgo}`)
      .then(res => res.json())
      .then(data => {
        histList.innerHTML = data.logs.length ? "" : "<div style='text-align:center;color:#9ca3af;padding:10px;font-size:12px;'>該月份尚無打卡歷史紀錄</div>";
        data.logs.forEach(log => {
          histList.innerHTML += `
            <div class="log-item">
              <span>🟢 ${log.location}</span>
              <span>${log.time}</span>
              <span class="badge ${log.type === "上班" ? 'badge-in' : 'badge-out'}">${log.type}</span>
            </div>`;
        });
      });
  }

  // 主委端登入
  function handleCommitteeLogin() {
    const user = document.getElementById('commUser').value.trim();
    const pw = document.getElementById('commPassword').value.trim();
    if(!user || !pw) return alert("請輸入管理帳號與密碼");

    fetch(`${GAS_WEB_APP_URL}?action=committeeLogin&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pw)}`)
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          committeeLocation = data.location;
          document.getElementById('commLoginForm').style.display = 'none';
          document.getElementById('commMainZone').style.display = 'block';
          document.getElementById('showCommName').innerText = data.committeeName;
          document.getElementById('showCommLocation').innerText = data.location;

          // 當月打卡紀錄速覽
          const attList = document.getElementById('commAttendanceList');
          attList.innerHTML = data.attendance.length ? "" : "<div style='text-align:center;color:#9ca3af;padding:10px;font-size:12px;'>本月目前無任何人員打卡</div>";
          data.attendance.forEach(log => {
            attList.innerHTML += `
              <div class="log-item">
                <strong>👤 ${log.name}</strong>
                <span>${log.time}</span>
                <span class="badge ${log.type === '上班' ? 'badge-in' : 'badge-out'}">${log.type}</span>
              </div>`;
          });

          // 全社區同仁請假狀態查閱
          renderLeaveStatusList('commLeaveList', data.leaves);
        } else { alert(data.message); }
      });
  }

  // 共用：請假審核狀態查閱渲染（能明確查看是否有被審核過）
  function renderLeaveStatusList(elementId, leaves) {
    const list = document.getElementById(elementId);
    list.innerHTML = leaves.length ? "" : "<div style='text-align:center;color:#9ca3af;padding:10px;font-size:12px;'>暫無請假申請紀錄</div>";
    leaves.forEach(lv => {
      let color = "#f59e0b"; // 待審核＝黃色
      if(lv.status === "已核准") color = "#10b981"; // 已核准＝綠色
      if(lv.status === "已拒絕") color = "#ef4444"; // 已拒絕＝紅色

      list.innerHTML += `
        <div class="log-item">
          <div>
            <strong>👤 ${lv.name || currentEmployeeData.employeeName}</strong> <span style="color:#6b7280;">(${lv.type})</span><br>
            <span style="font-size:11px;color:#9ca3af;">${lv.duration}</span>
          </div>
          <span style="color:${color}; font-weight:bold; font-size:13px; border:1px solid ${color}; padding:2px 6px; border-radius:4px;">${lv.status}</span>
        </div>`;
    });
  }

  // 主委一鍵點選下載指定月份排班表 CSV 
  function downloadReport(monthsAgo) {
    if(!committeeLocation) return alert("請先登入系統");
    const downloadUrl = `${GAS_WEB_APP_URL}?action=downloadCommitteeReport&location=${encodeURIComponent(committeeLocation)}&monthsAgo=${monthsAgo}`;
    window.location.href = downloadUrl; // 直接觸發瀏覽器下載
  }

  // 打卡及請假送出
  function handleClock(type) {
    if(!currentEmployeeData) return;
    navigator.geolocation.getCurrentPosition((pos) => {
      fetch(`${GAS_WEB_APP_URL}?action=${type}&employeeId=${encodeURIComponent(document.getElementById('empId').value)}&employeeName=${encodeURIComponent(currentEmployeeData.employeeName)}&location=${encodeURIComponent(document.getElementById('empLocationSelect').value)}&lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`)
        .then(res => res.json()).then(data => { alert(data.message); queryEmployeeHistory(); });
    }, () => alert("打卡必須取得 GPS 定位權限"));
  }

  function handleLeaveSubmit() {
    const type = document.getElementById('leaveType').value;
    const start = document.getElementById('leaveStart').value;
    const end = document.getElementById('leaveEnd').value;
    if(!start || !end) return alert("請選擇請假時間");
    fetch(`${GAS_WEB_APP_URL}?action=submitLeave&employeeId=${encodeURIComponent(document.getElementById('empId').value)}&employeeName=${encodeURIComponent(currentEmployeeData.employeeName)}&location=${encodeURIComponent(currentEmployeeData.assignedLocation)}&leaveType=${encodeURIComponent(type)}&startTime=${start}&endTime=${end}`)
      .then(res => res.json()).then(data => { alert(data.message); handleEmployeeLogin(); });
  }
</script>
</body>
</html>
