<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#16324f"><meta name="apple-mobile-web-app-capable" content="yes"><title>紘嘉物業員工 App</title><link rel="manifest" href="mobile-manifest.json"><link rel="apple-touch-icon" href="assets/company-logo.png"><link rel="stylesheet" href="assets/mobile.css?v=1"></head>
<body>
<section id="mobileLogin" class="login-screen"><div class="login-box"><img src="assets/company-logo.png" alt="紘嘉物業保全股份有限公司"><h1>員工行動 App</h1><p>勤務、打卡與請假</p><form id="mobileLoginForm"><label>員工工號<input id="mobileEmail" type="text" required autocomplete="username" placeholder="例如：A001"></label><label>密碼<input id="mobilePassword" type="password" required autocomplete="current-password"></label><button>登入</button></form><p id="mobileLoginMessage" class="error"></p></div></section>
<div id="mobileApp" hidden>
  <header><div><small>紘嘉物業保全</small><h1 id="employeeGreeting">您好</h1></div><button id="mobileLogout">登出</button></header>
  <main>
    <section id="homeTab" class="tab active"><article class="hero"><small>今日勤務</small><h2 id="todaySite">尚無排班</h2><p id="todayShift">—</p></article><article class="card"><h3>最新公告</h3><div id="announcementList"></div></article><article class="card"><h3>GPS 出勤打卡</h3><p id="locationStatus">打卡時會請求定位權限</p><div class="punch"><button id="clockIn">上班打卡</button><button id="clockOut" class="outline">下班打卡</button></div><p id="punchResult"></p></article><article class="card"><h3>今日出勤</h3><div id="todayAttendance" class="empty">尚無打卡紀錄</div></article></section>
    <section id="scheduleTab" class="tab"><article class="card"><h3>近期班表</h3><div id="scheduleList"></div></article></section>
    <section id="leaveTab" class="tab"><article class="card"><h3>請假申請</h3><form id="leaveForm"><label>假別<select name="leave_type" required><option value="annual">特休</option><option value="personal">事假</option><option value="sick">病假</option><option value="official">公假</option></select></label><div class="dates"><label>開始日期<input name="start_date" type="date" required></label><label>結束日期<input name="end_date" type="date" required></label></div><label>原因<textarea name="reason" required></textarea></label><button>送出申請</button></form><p id="leaveMessage"></p></article><article class="card"><h3>申請紀錄</h3><div id="leaveList"></div></article></section>
  </main>
  <nav><button data-tab="homeTab" class="active">今日</button><button data-tab="scheduleTab">班表</button><button data-tab="leaveTab">請假</button></nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js?v=14"></script><script src="assets/mobile.js?v=4"></script></body></html>
