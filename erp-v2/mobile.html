<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#16324f"><meta name="apple-mobile-web-app-capable" content="yes"><title>紘嘉物業員工 App</title><link rel="manifest" href="mobile-manifest-v2.json"><link rel="icon" href="assets/employee-icon-v2-192.png" type="image/png"><link rel="shortcut icon" href="favicon-v2.ico" type="image/x-icon"><link rel="apple-touch-icon" href="assets/employee-icon-v2-192.png"><link rel="stylesheet" href="assets/mobile.css?v=3"><link rel="stylesheet" href="assets/mobile-enhancements.css?v=2"></head>
<body>
<section id="mobileLogin" class="login-screen"><div class="login-box"><img src="assets/company-logo.png" alt="紘嘉物業保全股份有限公司"><h1>員工行動 App</h1><p>勤務、打卡與請假</p><form id="mobileLoginForm"><label>員工工號<input id="mobileEmail" type="text" required autocomplete="username" placeholder="例如：A001"></label><label>密碼<input id="mobilePassword" type="password" required autocomplete="current-password"></label><button>登入</button></form><p id="mobileLoginMessage" class="error"></p></div></section>
<div id="mobileApp" hidden>
  <header><div><small>紘嘉物業保全</small><h1 id="employeeGreeting">您好</h1></div><button id="mobileLogout">登出</button></header>
  <main>
    <section id="homeTab" class="tab active"><article class="hero home-hero"><div class="hero-clock"><span id="homeDate">今天</span><strong id="homeTime">--:--</strong></div><small>EMPLOYEE WORKSPACE</small><h2 id="homeGreeting">您好</h2><p>今天也辛苦了，請記得確認勤務與打卡。</p></article><article class="card duty-card"><div class="card-title"><span class="card-symbol">班</span><div><small>今日勤務</small><h3 id="todaySite">尚無排班</h3></div></div><p id="todayShift">—</p><div id="todayScheduleOptions"></div></article><article class="card announcement-card"><div class="card-title"><span class="card-symbol">告</span><h3>最新公告</h3></div><div id="announcementList"></div></article><article class="card punch-card"><div class="card-title"><span class="card-symbol location-symbol">卡</span><div><h3>GPS 出勤打卡</h3><small>打卡時自動辨識最近的排班案場</small></div></div><p id="locationStatus" class="location-panel">尚未定位，按下打卡後將取得目前位置</p><div class="punch"><button id="clockIn">上班打卡</button><button id="clockOut" class="outline">下班打卡</button></div><p id="punchResult" class="punch-result"></p></article><article class="card"><h3>今日出勤</h3><div id="todayAttendance" class="empty">尚無打卡紀錄</div></article><article class="card"><h3>我的借支狀態</h3><div id="advanceList"></div></article></section>
    <section id="scheduleTab" class="tab"><article class="card"><div class="month-head"><button id="schedulePrev" class="month-button">‹</button><div><small>完整班表</small><h3 id="scheduleMonthTitle">本月班表</h3></div><button id="scheduleNext" class="month-button">›</button></div><div id="scheduleList"></div></article></section>
    <section id="attendanceTab" class="tab"><article class="card"><div class="month-head"><button id="attendancePrev" class="month-button">‹</button><div><small>個人紀錄</small><h3 id="attendanceMonthTitle">本月打卡</h3></div><button id="attendanceNext" class="month-button">›</button></div><div id="attendanceSummary" class="mobile-stats"></div><div id="attendanceList"></div></article></section>
    <section id="leaveTab" class="tab"><article class="card balance-card"><small>目前特休餘額</small><strong id="annualLeaveBalance">0 小時</strong></article><article class="card"><h3>請假申請</h3><form id="leaveForm"><label>假別<select name="leave_type" required><option value="annual">特休</option><option value="personal">事假</option><option value="sick">病假</option><option value="official">公假</option><option value="marriage">婚假</option><option value="bereavement">喪假</option><option value="maternity">產假</option><option value="paternity">陪產檢及陪產假</option><option value="menstrual">生理假</option><option value="occupational">公傷病假</option><option value="compensatory">補休</option><option value="unpaid">無薪假</option><option value="other">其他</option></select></label><div class="dates"><label>開始日期<input name="start_date" type="date" required></label><label>結束日期<input name="end_date" type="date" required></label></div><label>請假時數<input name="leave_hours" type="number" min="0.5" step="0.5" value="8" required><small id="leaveHoursHint">將依班表或標準每日工時自動計算</small></label><label>證明文件（JPG、PNG、PDF，最多 10MB）<input name="proof_file" type="file" accept="image/jpeg,image/png,application/pdf"></label><label>原因<textarea name="reason" required></textarea></label><button>送出申請</button></form><p id="leaveMessage"></p></article><article class="card"><h3>申請紀錄</h3><div id="leaveList"></div></article></section>
    <section id="complaintTab" class="tab"><article class="card confidential"><h3>反霸凌申訴</h3><p>此處內容屬保密資料，僅您本人及人事／管理員可查看。</p><form id="complaintForm"><label>事件日期<input name="incident_date" type="date" required></label><label>事件地點<input name="incident_location" type="text"></label><label>被申訴人姓名或職稱<input name="accused_name" type="text"></label><label>事件經過<textarea name="description" required></textarea></label><label>希望處理方式<textarea name="requested_action"></textarea></label><label>證明文件（JPG、PNG、PDF，最多 10MB）<input name="evidence_file" type="file" accept="image/jpeg,image/png,application/pdf"></label><button>送出保密申訴</button></form><p id="complaintMessage"></p></article><article class="card"><h3>我的申訴進度</h3><div id="complaintList"></div></article></section>
  </main>
  <nav style="grid-template-columns:repeat(5,1fr)"><button data-tab="homeTab" class="active">今日</button><button data-tab="scheduleTab">班表</button><button data-tab="attendanceTab">打卡</button><button data-tab="leaveTab">請假</button><button data-tab="complaintTab">申訴</button></nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js?v=37"></script><script src="assets/mobile.js?v=14"></script></body></html>
