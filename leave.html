<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>請假申請｜紘嘉物業</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>

*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans TC",sans-serif;-webkit-tap-highlight-color:transparent}
:root{--primary:#4e54c8;--primary-dark:#3d43a7;--success:#27ae60;--danger:#e53e3e;--warning:#d69e2e;--bg:#f3f5f9;--card:#fff;--text:#2d3748;--muted:#718096;--line:#e2e8f0}
body{background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
.app-shell{max-width:720px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:82px}
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand img{width:42px;height:42px;object-fit:contain;border-radius:10px;background:white}
.brand h1{font-size:17px}.brand p{font-size:11px;color:var(--muted);margin-top:2px}
.header-action{border:none;background:#fff5f5;color:var(--danger);border:1px solid #fed7d7;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}
.page-content{padding:16px}
.card{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 5px 18px rgba(33,40,74,.07);margin-bottom:14px;border:1px solid rgba(226,232,240,.8)}
.card-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;margin-bottom:12px}
.hero{background:linear-gradient(135deg,#4e54c8,#7379e9);color:white}
.hero .sub{font-size:12px;opacity:.85}.hero h2{font-size:22px;margin:6px 0 12px}.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hero-grid div{background:rgba(255,255,255,.13);border-radius:12px;padding:10px;font-size:13px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px}
.stat small{display:block;color:var(--muted);margin-bottom:5px}.stat strong{font-size:18px}
.clock{background:#1a202c;color:white;border-radius:18px;padding:16px;text-align:center}
.clock-time{font:700 34px monospace;color:#65e7ef}.clock-date{font-size:13px;color:#a0aec0;margin-top:3px}
.form-group{margin-bottom:13px}.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#4a5568}
.control{width:100%;border:1px solid #cbd5e0;border-radius:12px;padding:12px 14px;background:#fff;font-size:15px;outline:none}
.control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(78,84,200,.12)}
.btn{width:100%;border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-light{background:#edf2f7;color:#4a5568}
.punch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.punch-grid .btn{height:78px;flex-direction:column}
.notice{background:#fffaf0;border:1px solid #feebc8;border-radius:14px;padding:12px;font-size:13px;line-height:1.55}
.notice-item{padding-bottom:8px;margin-bottom:8px;border-bottom:1px dashed #fbd38d}.notice-item:last-child{border:0;margin:0;padding:0}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(720px,100%);z-index:50;background:white;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -6px 20px rgba(0,0,0,.06)}
.nav-item{text-align:center;color:#718096;font-size:11px;font-weight:700;padding:5px}.nav-item i{display:block;font-size:20px;margin-bottom:4px}.nav-item.active{color:var(--primary)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#edf0ff,#f7f8fb 55%,#eef7f2)}
.login-card{width:100%;max-width:410px;background:white;border-radius:24px;padding:28px;box-shadow:0 15px 45px rgba(38,47,89,.13)}
.login-logo{text-align:center;margin-bottom:24px}.login-logo img{width:104px;height:104px;object-fit:contain}.login-logo h1{font-size:22px;margin-top:10px}.login-logo p{font-size:13px;color:var(--muted);margin-top:5px}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.86);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999}
.spinner{width:42px;height:42px;border:4px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}@keyframes spin{to{transform:rotate(360deg)}}
.schedule-card{background:white;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:9px}.schedule-card.today{border:2px solid var(--primary);background:#f8f8ff}
.date-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}.badge{display:inline-block;padding:3px 8px;border-radius:7px;font-size:11px;font-weight:700}.badge-ok{background:#c6f6d5;color:#22543d}.badge-wait{background:#feebc8;color:#975a16}.badge-no{background:#fed7d7;color:#9b2c2c}
.month-bar{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.month-bar .btn{width:auto;padding:12px}
.history-card{background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:8px;font-size:13px;line-height:1.55}
.duration{background:#f0fff4;border:1px solid #c6f6d5;color:#22543d;border-radius:12px;padding:10px 12px;font-size:13px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px}
@media(max-width:480px){.page-content{padding:12px}.topbar{padding:10px 12px}.brand h1{font-size:15px}.hero h2{font-size:20px}}

.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profile-item{background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:11px}
.profile-item small{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
.profile-item strong{font-size:15px}
.leave-balance{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.leave-balance .balance-box{border-radius:13px;padding:11px 6px;text-align:center;background:#f8fafc;border:1px solid var(--line)}
.balance-box b{display:block;font-size:20px;color:var(--primary)}
.balance-box span{font-size:11px;color:var(--muted)}
.balance-box.remaining{background:#f0fff4;border-color:#c6f6d5}.balance-box.remaining b{color:#23834c}
.balance-warning{background:#fff5f5;border:1px solid #fed7d7;color:#9b2c2c;padding:10px 12px;border-radius:12px;font-size:13px;margin-top:10px}

</style></head>
<body><div class="app-shell"><header class="topbar"><div class="brand"><img src="https://i.meee.com.tw/2Pr2uHH.png" alt="Logo"><div><h1>紘嘉物業員工系統</h1><p><span data-emp-name>同仁</span> 您好</p></div></div><button class="header-action" onclick="logout()">登出</button></header><main class="page-content">

<section class="card">
  <div class="card-title"><i class="fa-solid fa-umbrella-beach"></i><span id="leaveSummaryTitle">特休使用狀況</span></div>
  <div class="profile-grid" style="margin-bottom:10px">
    <div class="profile-item"><small>入職日期</small><strong id="leaveJoinDate">--</strong></div>
    <div class="profile-item"><small>年度特休</small><strong id="leaveTotal">0 日</strong></div>
  </div>
  <div class="leave-balance">
    <div class="balance-box"><b id="leaveApproved">0</b><span>已核准（日）</span></div>
    <div class="balance-box"><b id="leavePending">0</b><span>待審核（日）</span></div>
    <div class="balance-box remaining"><b id="leaveRemaining">0</b><span>可申請（日）</span></div>
  </div>
  <div class="balance-warning" id="leaveLimitWarning" style="display:none"></div>
</section>

<section class="card"><div class="card-title"><i class="fa-solid fa-file-medical"></i>線上請假申請</div>
<div class="form-group"><label>請假類別</label><select id="leaveType" class="control"><option>事假</option><option>病假</option><option>特休</option><option>公假</option><option>婚假/喪假</option></select></div>
<div class="form-group"><label>開始時間</label><input type="datetime-local" id="leaveStart" class="control"></div><div class="form-group"><label>結束時間</label><input type="datetime-local" id="leaveEnd" class="control"></div>
<div class="form-group"><label>證明文件</label><input type="file" id="leaveFile" class="control" accept="image/*"></div><div class="form-group"><label>請假事由</label><textarea id="leaveReason" class="control" rows="4" placeholder="請填寫具體原因"></textarea></div>
<div class="duration" id="durationInfo"><i class="fa-solid fa-calculator"></i> 選擇起迄時間後自動估算。</div><button class="btn btn-primary" style="margin-top:12px" onclick="submitLeave()"><i class="fa-solid fa-paper-plane"></i>送出請假申請</button></section>
<section class="card"><div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i>審核紀錄 <span style="margin-left:auto;font-size:10px;color:#4e54c8;">正式版 1.0</span></div><div id="history">讀取中...</div></section>
</main><nav class="bottom-nav">
<a class="nav-item NAV_DASH" href="dashboard.html"><i class="fa-solid fa-fingerprint"></i>打卡首頁</a>
<a class="nav-item NAV_SCHEDULE" href="schedule.html"><i class="fa-solid fa-calendar-days"></i>我的班表</a>
<a class="nav-item NAV_LEAVE active" href="leave.html"><i class="fa-solid fa-file-medical"></i>請假申請</a>
</nav></div><div class="loading" id="loading"><div class="spinner"></div><b id="loadingText">資料讀取中...</b></div>
<script>

const BASE_GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";
const SESSION_KEY = "hongjia_employee_session_v2";

function saveSession(data) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(data));
}
function getSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch(e) { return null; }
}
function requireSession() {
  const s = getSession();
  if(!s || !s.employeeId) { location.href = "index.html"; return null; }
  return s;
}
function logout() {
  localStorage.removeItem(SESSION_KEY);
  location.href = "index.html";
}
function showLoading(text) {
  const el = document.getElementById("loading");
  const t = document.getElementById("loadingText");
  if(t) t.textContent = text || "資料處理中...";
  if(el) el.style.display = "flex";
}
function hideLoading() {
  const el = document.getElementById("loading");
  if(el) el.style.display = "none";
}
function jsonp(url, callbackName) {
  return new Promise((resolve,reject)=>{
    let done=false;
    const cleanup=()=>{ const s=document.getElementById(callbackName); if(s)s.remove(); try{delete window[callbackName]}catch(e){} };
    const timer=setTimeout(()=>{ if(done)return; done=true; cleanup(); reject(new Error("timeout")); },15000);
    window[callbackName]=(data)=>{ if(done)return; done=true; clearTimeout(timer); cleanup(); resolve(data); };
    const script=document.createElement("script");
    script.id=callbackName;
    script.src=url+(url.includes("?")?"&":"?")+"callback="+encodeURIComponent(callbackName)+"&_ts="+Date.now();
    script.onerror=()=>{ if(done)return; done=true; clearTimeout(timer); cleanup(); reject(new Error("network")); };
    document.body.appendChild(script);
  });
}
function esc(v) {
  return String(v==null?"":v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}
function currentMonthName() {
  const d=new Date();
  return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,"0")}月`;
}
function initBrandUser() {
  const s=getSession();
  document.querySelectorAll("[data-emp-name]").forEach(el=>el.textContent=s?.employeeName||"同仁");
}

</script><script>
const session = requireSession();
initBrandUser();

const el = {
  leaveJoinDate: document.getElementById("leaveJoinDate"),
  leaveSummaryTitle: document.getElementById("leaveSummaryTitle"),
  leaveTotal: document.getElementById("leaveTotal"),
  leaveApproved: document.getElementById("leaveApproved"),
  leavePending: document.getElementById("leavePending"),
  leaveRemaining: document.getElementById("leaveRemaining"),
  leaveLimitWarning: document.getElementById("leaveLimitWarning"),
  leaveType: document.getElementById("leaveType"),
  leaveStart: document.getElementById("leaveStart"),
  leaveEnd: document.getElementById("leaveEnd"),
  leaveFile: document.getElementById("leaveFile"),
  leaveReason: document.getElementById("leaveReason"),
  durationInfo: document.getElementById("durationInfo"),
  history: document.getElementById("history")
};

let leaveSummary = null;

el.leaveJoinDate.textContent = session.joinDate || "未填";
el.leaveSummaryTitle.textContent = new Date().getFullYear() + " 年度特休使用狀況";

function fmtDay(v) {
  const n = Number(v || 0);
  return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
}

async function loadLeaveSummary() {
  try {
    const res = await jsonp(
      `${BASE_GAS_URL}?action=fetchEmployeeLeaveSummary&employeeId=${encodeURIComponent(session.employeeId)}`,
      "cb_lsum_" + Date.now()
    );
    if (res && res.success) {
      leaveSummary = res;
      el.leaveTotal.textContent = fmtDay(res.totalDays) + " 日";
      el.leaveApproved.textContent = fmtDay(res.approvedDays);
      el.leavePending.textContent = fmtDay(res.pendingDays);
      el.leaveRemaining.textContent = fmtDay(res.remainingDays);
      validateSpecialLeave();
    } else {
      throw new Error((res && res.message) || "特休資料格式錯誤");
    }
  } catch (e) {
    el.leaveLimitWarning.style.display = "block";
    el.leaveLimitWarning.textContent = "特休額度讀取失敗：" + (e.message || "通訊異常");
  }
}

function requestedLeaveDays() {
  const start = el.leaveStart.value;
  const end = el.leaveEnd.value;
  if (!start || !end) return 0;
  const hours = (new Date(end) - new Date(start)) / 3600000;
  return hours > 0 ? hours / 8 : 0;
}

function validateSpecialLeave() {
  el.leaveLimitWarning.style.display = "none";
  if (el.leaveType.value !== "特休") return true;

  if (!leaveSummary) {
    el.leaveLimitWarning.style.display = "block";
    el.leaveLimitWarning.textContent = "尚未取得特休額度，請稍後再試。";
    return false;
  }

  const req = requestedLeaveDays();
  if (Number(leaveSummary.remainingDays || 0) <= 0) {
    el.leaveLimitWarning.style.display = "block";
    el.leaveLimitWarning.textContent = "本年度特休已用完或已被待審核假單占用，不能再申請特休。";
    return false;
  }

  if (req > Number(leaveSummary.remainingDays || 0) + 0.0001) {
    el.leaveLimitWarning.style.display = "block";
    el.leaveLimitWarning.textContent =
      `此次預估申請 ${fmtDay(req)} 日，但目前只剩 ${fmtDay(leaveSummary.remainingDays)} 日，不能送出。`;
    return false;
  }
  return true;
}

function updateDuration() {
  const start = el.leaveStart.value;
  const end = el.leaveEnd.value;

  if (!start || !end) {
    el.durationInfo.innerHTML = '<i class="fa-solid fa-calculator"></i> 選擇起迄時間後自動估算。';
    validateSpecialLeave();
    return;
  }

  const hours = (new Date(end) - new Date(start)) / 3600000;
  if (hours <= 0) {
    el.durationInfo.textContent = "結束時間必須晚於開始時間";
    validateSpecialLeave();
    return;
  }

  el.durationInfo.innerHTML =
    `預估請假：<b>${hours.toFixed(hours % 1 ? 1 : 0)} 小時</b>（約 <b>${(hours / 8).toFixed(2)} 日</b>）`;
  validateSpecialLeave();
}

async function requestLeaveRecords(actionName) {
  const url =
    `${BASE_GAS_URL}?action=${actionName}&employeeId=${encodeURIComponent(session.employeeId)}`;
  return await jsonp(url, "cb_leave_" + actionName + "_" + Date.now());
}

function renderLeaveRecords(res) {
  if (!res || res.success !== true) {
    throw new Error((res && res.message) || "後端未回傳正確資料");
  }

  const records = Array.isArray(res.records) ? res.records : [];
  if (!records.length) {
    el.history.innerHTML = '<div class="empty">目前尚無請假紀錄。</div>';
    return;
  }

  el.history.innerHTML = records.map(r => `
    <div class="history-card">
      <span class="badge ${
        r.status === "已核准" ? "badge-ok" :
        r.status === "駁回" ? "badge-no" : "badge-wait"
      }" style="float:right">${esc(r.status || "待審核")}</span>
      <b>${esc(r.leaveType || "未填假別")}</b>
      <br><small>${esc(r.start || "--")} ～ ${esc(r.end || "--")}</small>
      <br>事由：${esc(r.reason || "--")}
      ${r.applyTime ? `<br><small style="color:#718096;">申請時間：${esc(r.applyTime)}</small>` : ""}
    </div>
  `).join("");
}

async function loadHistory() {
  el.history.innerHTML =
    '<div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> 正在讀取審核紀錄（正式版 1.0）...</div>';

  try {
    let res;
    try {
      res = await requestLeaveRecords("fetchEmployeeLeaveRecords");
    } catch (firstError) {
      res = await requestLeaveRecords("fetchLeaveRecords");
    }
    renderLeaveRecords(res);
  } catch (e) {
    el.history.innerHTML = `
      <div class="empty" style="color:#e53e3e;">
        審核紀錄讀取失敗：${esc(e.message || "通訊逾時")}
        <br>
        <button class="btn btn-light" style="margin-top:12px;" onclick="loadHistory()">
          <i class="fa-solid fa-rotate-right"></i>重新讀取
        </button>
      </div>`;
  }
}

async function postPayload(payload) {
  const response = await fetch(BASE_GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  });
  return await response.json();
}

async function submitLeave() {
  const start = el.leaveStart.value;
  const end = el.leaveEnd.value;
  const reason = el.leaveReason.value.trim();

  if (!start || !end || !reason) {
    alert("請完整填寫請假時間與事由");
    return;
  }

  if (el.leaveType.value === "特休" && !validateSpecialLeave()) {
    alert(el.leaveLimitWarning.textContent);
    return;
  }

  const location =
    (session.allLocations && session.allLocations[0]) ||
    session.assignedLocation ||
    "未知案場";

  showLoading("正在送出請假單...");
  const file = el.leaveFile.files[0];

  const send = async (fileData = "", fileName = "", fileType = "") => {
    try {
      const res = await postPayload({
        action: "leaveSubmit",
        employeeId: session.employeeId,
        employeeName: session.employeeName,
        location,
        leaveType: el.leaveType.value,
        start: start.replace("T", " "),
        end: end.replace("T", " "),
        reason,
        fileData,
        fileName,
        fileType
      });

      hideLoading();
      alert(res.message || "送出完成");

      if (res.success) {
        el.leaveStart.value = "";
        el.leaveEnd.value = "";
        el.leaveReason.value = "";
        el.leaveFile.value = "";
        updateDuration();
        await loadHistory();
        await loadLeaveSummary();
      }
    } catch (e) {
      hideLoading();
      alert("請假單送出失敗：" + (e.message || "通訊異常"));
    }
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = e => send(e.target.result, file.name, file.type);
    reader.readAsDataURL(file);
  } else {
    send();
  }
}

el.leaveStart.addEventListener("change", updateDuration);
el.leaveEnd.addEventListener("change", updateDuration);
el.leaveType.addEventListener("change", validateSpecialLeave);

window.addEventListener("error", function(event) {
  if (el.history && el.history.textContent.includes("讀取中")) {
    el.history.innerHTML = `
      <div class="empty" style="color:#e53e3e;">
        頁面程式錯誤：${esc(event.message || "未知錯誤")}
        <br>
        <button class="btn btn-light" style="margin-top:12px;" onclick="location.reload()">
          重新整理
        </button>
      </div>`;
  }
});

loadHistory();
loadLeaveSummary();
</script></body></html>
