<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>請假申請｜紘嘉物業</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="assets/app.css"></head>
<body><div class="app-shell"><header class="topbar"><div class="brand"><img src="https://i.meee.com.tw/2Pr2uHH.png" alt="Logo"><div><h1>紘嘉物業員工系統</h1><p><span data-emp-name>同仁</span> 您好</p></div></div><button class="header-action" onclick="logout()">登出</button></header><main class="page-content">
<section class="card"><div class="card-title"><i class="fa-solid fa-file-medical"></i>線上請假申請</div>
<div class="form-group"><label>請假類別</label><select id="leaveType" class="control"><option>事假</option><option>病假</option><option>特休</option><option>公假</option><option>婚假/喪假</option></select></div>
<div class="form-group"><label>開始時間</label><input type="datetime-local" id="leaveStart" class="control"></div><div class="form-group"><label>結束時間</label><input type="datetime-local" id="leaveEnd" class="control"></div>
<div class="form-group"><label>證明文件</label><input type="file" id="leaveFile" class="control" accept="image/*"></div><div class="form-group"><label>請假事由</label><textarea id="leaveReason" class="control" rows="4" placeholder="請填寫具體原因"></textarea></div>
<div class="duration" id="durationInfo"><i class="fa-solid fa-calculator"></i> 選擇起迄時間後自動估算。</div><button class="btn btn-primary" style="margin-top:12px" onclick="submitLeave()"><i class="fa-solid fa-paper-plane"></i>送出請假申請</button></section>
<section class="card"><div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i>審核紀錄</div><div id="history">讀取中...</div></section>
</main><nav class="bottom-nav">
<a class="nav-item NAV_DASH" href="dashboard.html"><i class="fa-solid fa-fingerprint"></i>打卡首頁</a>
<a class="nav-item NAV_SCHEDULE" href="schedule.html"><i class="fa-solid fa-calendar-days"></i>我的班表</a>
<a class="nav-item NAV_LEAVE active" href="leave.html"><i class="fa-solid fa-file-medical"></i>請假申請</a>
</nav></div><div class="loading" id="loading"><div class="spinner"></div><b id="loadingText">資料讀取中...</b></div>
<script src="assets/common.js"></script><script>
const session=requireSession();initBrandUser();
function updateDuration(){const s=leaveStart.value,e=leaveEnd.value;if(!s||!e){durationInfo.innerHTML='<i class="fa-solid fa-calculator"></i> 選擇起迄時間後自動估算。';return}const h=(new Date(e)-new Date(s))/3600000;if(h<=0){durationInfo.textContent="結束時間必須晚於開始時間";return}durationInfo.innerHTML=`預估請假：<b>${h.toFixed(h%1?1:0)} 小時</b>（約 <b>${(h/8).toFixed(2)} 日</b>）`}
async function loadHistory(){try{const res=await jsonp(`${BASE_GAS_URL}?action=fetchLeaveRecords&employeeId=${session.employeeId}`,"cb_h_"+Date.now());history.innerHTML=res.success&&res.records?.length?res.records.map(r=>`<div class="history-card"><span class="badge ${r.status==="已核准"?"badge-ok":r.status==="駁回"?"badge-no":"badge-wait"}" style="float:right">${esc(r.status)}</span><b>${esc(r.leaveType)}</b><br><small>${esc(r.start)} ～ ${esc(r.end)}</small><br>事由：${esc(r.reason)}</div>`).join(""):'<div class="empty">目前尚無請假紀錄。</div>'}catch(e){history.innerHTML='<div class="empty">紀錄讀取失敗。</div>'}}
async function postPayload(payload){const r=await fetch(BASE_GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});return await r.json()}
async function submitLeave(){const start=leaveStart.value,end=leaveEnd.value,reason=leaveReason.value.trim();if(!start||!end||!reason){alert("請完整填寫請假時間與事由");return}const loc=session.allLocations?.[0]||session.assignedLocation||"未知案場";showLoading("正在送出請假單...");const file=leaveFile.files[0];const send=async(fileData="",fileName="",fileType="")=>{try{const res=await postPayload({action:"leaveSubmit",employeeId:session.employeeId,employeeName:session.employeeName,location:loc,leaveType:leaveType.value,start:start.replace("T"," "),end:end.replace("T"," "),reason,fileData,fileName,fileType});hideLoading();alert(res.message||"送出完成");if(res.success){leaveStart.value=leaveEnd.value=leaveReason.value=leaveFile.value="";updateDuration();loadHistory()}}catch(e){hideLoading();alert("請假單送出失敗，請稍後再試")}};if(file){const reader=new FileReader();reader.onload=e=>send(e.target.result,file.name,file.type);reader.readAsDataURL(file)}else send()}
leaveStart.addEventListener("change",updateDuration);leaveEnd.addEventListener("change",updateDuration);loadHistory();
</script></body></html>
