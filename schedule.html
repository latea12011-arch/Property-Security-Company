<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>我的班表｜紘嘉物業</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#4e54c8"><meta name="apple-mobile-web-app-capable" content="yes"><script defer src="assets/pwa.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>

*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans TC",sans-serif;-webkit-tap-highlight-color:transparent}
:root{--primary:#4e54c8;--primary-dark:#3d43a7;--success:#27ae60;--danger:#e53e3e;--warning:#d69e2e;--bg:#f3f5f9;--card:#fff;--text:#2d3748;--muted:#718096;--line:#e2e8f0}
body{background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
.app-shell{max-width:720px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:82px}
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand img{width:42px;height:42px;object-fit:contain;border-radius:10px;background:white}
.brand h1{font-size:17px}.brand p{font-size:11px;color:var(--muted);margin-top:2px}
.header-action{border:none;background:#fff5f5;color:var(--danger);border:1px solid #fed7d7;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}
.page-content{padding:16px}
.card{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 5px 18px rgba(33,40,74,.07);margin-bottom:14px;border:1px solid rgba(226,232,240,.8)}
.card-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;margin-bottom:12px}
.hero{background:linear-gradient(135deg,#4e54c8,#7379e9);color:white}
.hero .sub{font-size:12px;opacity:.85}.hero h2{font-size:22px;margin:6px 0 12px}.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hero-grid div{background:rgba(255,255,255,.13);border-radius:12px;padding:10px;font-size:13px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px}
.stat small{display:block;color:var(--muted);margin-bottom:5px}.stat strong{font-size:18px}
.clock{background:#1a202c;color:white;border-radius:18px;padding:16px;text-align:center}
.clock-time{font:700 34px monospace;color:#65e7ef}.clock-date{font-size:13px;color:#a0aec0;margin-top:3px}
.form-group{margin-bottom:13px}.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#4a5568}
.control{width:100%;border:1px solid #cbd5e0;border-radius:12px;padding:12px 14px;background:#fff;font-size:15px;outline:none}
.control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(78,84,200,.12)}
.btn{width:100%;border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-light{background:#edf2f7;color:#4a5568}
.punch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.punch-grid .btn{height:78px;flex-direction:column}
.notice{background:#fffaf0;border:1px solid #feebc8;border-radius:14px;padding:12px;font-size:13px;line-height:1.55}
.notice-item{padding-bottom:8px;margin-bottom:8px;border-bottom:1px dashed #fbd38d}.notice-item:last-child{border:0;margin:0;padding:0}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(720px,100%);z-index:50;background:white;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -6px 20px rgba(0,0,0,.06)}
.nav-item{text-align:center;color:#718096;font-size:11px;font-weight:700;padding:5px}.nav-item i{display:block;font-size:20px;margin-bottom:4px}.nav-item.active{color:var(--primary)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#edf0ff,#f7f8fb 55%,#eef7f2)}
.login-card{width:100%;max-width:410px;background:white;border-radius:24px;padding:28px;box-shadow:0 15px 45px rgba(38,47,89,.13)}
.login-logo{text-align:center;margin-bottom:24px}.login-logo img{width:104px;height:104px;object-fit:contain}.login-logo h1{font-size:22px;margin-top:10px}.login-logo p{font-size:13px;color:var(--muted);margin-top:5px}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.86);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999}
.spinner{width:42px;height:42px;border:4px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}@keyframes spin{to{transform:rotate(360deg)}}
.schedule-card{background:white;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:9px}.schedule-card.today{border:2px solid var(--primary);background:#f8f8ff}
.date-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}.badge{display:inline-block;padding:3px 8px;border-radius:7px;font-size:11px;font-weight:700}.badge-ok{background:#c6f6d5;color:#22543d}.badge-wait{background:#feebc8;color:#975a16}.badge-no{background:#fed7d7;color:#9b2c2c}
.month-bar{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.month-bar .btn{width:auto;padding:12px}
.history-card{background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:8px;font-size:13px;line-height:1.55}
.duration{background:#f0fff4;border:1px solid #c6f6d5;color:#22543d;border-radius:12px;padding:10px 12px;font-size:13px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px}
@media(max-width:480px){.page-content{padding:12px}.topbar{padding:10px 12px}.brand h1{font-size:15px}.hero h2{font-size:20px}}

.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profile-item{background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:11px}
.profile-item small{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
.profile-item strong{font-size:15px}
.leave-balance{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.leave-balance .balance-box{border-radius:13px;padding:11px 6px;text-align:center;background:#f8fafc;border:1px solid var(--line)}
.balance-box b{display:block;font-size:20px;color:var(--primary)}
.balance-box span{font-size:11px;color:var(--muted)}
.balance-box.remaining{background:#f0fff4;border-color:#c6f6d5}.balance-box.remaining b{color:#23834c}
.balance-warning{background:#fff5f5;border:1px solid #fed7d7;color:#9b2c2c;padding:10px 12px;border-radius:12px;font-size:13px;margin-top:10px}

</style></head>
<body><div class="app-shell"><header class="topbar"><div class="brand"><img src="assets/company-logo.png" alt="紘嘉物業保全股份有限公司 Logo"><div><h1>紘嘉物業員工系統</h1><p><span data-emp-name>同仁</span> 您好</p></div></div><button class="header-action" onclick="logout()">登出</button></header><main class="page-content">
<section class="card"><div class="card-title"><i class="fa-solid fa-calendar-days"></i>我的班表</div><div class="month-bar"><button class="btn btn-light" onclick="moveMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button><select id="monthSelect" class="control" onchange="loadSchedule()"></select><button class="btn btn-light" onclick="moveMonth(1)"><i class="fa-solid fa-chevron-right"></i></button></div></section>
<section class="grid-2" style="margin-bottom:14px"><div class="stat"><small>值勤日</small><strong id="workDays">0</strong></div><div class="stat"><small>休假／未排</small><strong id="restDays">0</strong></div></section>
<section id="scheduleList"></section>
</main><nav class="bottom-nav">
<a class="nav-item NAV_DASH" href="dashboard.html"><i class="fa-solid fa-fingerprint"></i>打卡首頁</a>
<a class="nav-item NAV_SCHEDULE active" href="schedule.html"><i class="fa-solid fa-calendar-days"></i>我的班表</a>
<a class="nav-item NAV_LEAVE" href="leave.html"><i class="fa-solid fa-file-medical"></i>請假申請</a>
</nav></div><div class="loading" id="loading"><div class="spinner"></div><b id="loadingText">資料讀取中...</b></div>
<script>

const BASE_GAS_URL = "https://script.google.com/macros/s/AKfycbzQp1OVw4DdjuO0XzQUH3G8b2I0URZcJqViMppUbnRcOFQZSBh8K2f3IkNOneB-ohM/exec";
const SESSION_KEY = "hongjia_employee_session_v2";

function saveSession(data) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(data));
}
function getSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch(e) { return null; }
}
function requireSession() {
  const s = getSession();
  if(!s || !s.employeeId) { location.href = "index.html"; return null; }
  return s;
}
function logout() {
  localStorage.removeItem(SESSION_KEY);
  location.href = "index.html";
}
function showLoading(text) {
  const el = document.getElementById("loading");
  const t = document.getElementById("loadingText");
  if(t) t.textContent = text || "資料處理中...";
  if(el) el.style.display = "flex";
}
function hideLoading() {
  const el = document.getElementById("loading");
  if(el) el.style.display = "none";
}
function jsonp(url, callbackName) {
  return new Promise((resolve,reject)=>{
    let done=false;
    const cleanup=()=>{ const s=document.getElementById(callbackName); if(s)s.remove(); try{delete window[callbackName]}catch(e){} };
    const timer=setTimeout(()=>{ if(done)return; done=true; cleanup(); reject(new Error("timeout")); },15000);
    window[callbackName]=(data)=>{ if(done)return; done=true; clearTimeout(timer); cleanup(); resolve(data); };
    const script=document.createElement("script");
    script.id=callbackName;
    script.src=url+(url.includes("?")?"&":"?")+"callback="+encodeURIComponent(callbackName)+"&_ts="+Date.now();
    script.onerror=()=>{ if(done)return; done=true; clearTimeout(timer); cleanup(); reject(new Error("network")); };
    document.body.appendChild(script);
  });
}
function esc(v) {
  return String(v==null?"":v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}
function currentMonthName() {
  const d=new Date();
  return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,"0")}月`;
}
function initBrandUser() {
  const s=getSession();
  document.querySelectorAll("[data-emp-name]").forEach(el=>el.textContent=s?.employeeName||"同仁");
}

</script><script>
const session=requireSession();initBrandUser();
function initMonths(){const now=new Date();let h="";for(let i=-1;i<=12;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1),v=`${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,"0")}月`;h+=`<option value="${v}" ${i===0?"selected":""}>${v}</option>`}monthSelect.innerHTML=h}
function moveMonth(step){const i=monthSelect.selectedIndex+step;if(i>=0&&i<monthSelect.options.length){monthSelect.selectedIndex=i;loadSchedule()}}
function parseCell(v){const raw=String(v||"").trim(),p=raw.indexOf("-");let loc=p>=0?raw.slice(0,p).trim():"",shift=p>=0?raw.slice(p+1).trim():raw,time="";const m=shift.match(/\((.*?)\)$/);if(m){time=m[1];shift=shift.replace(/\((.*?)\)$/,"").trim()}return{loc,shift,time,raw}}
async function loadSchedule(){scheduleList.innerHTML='<div class="card empty"><i class="fa-solid fa-spinner fa-spin"></i> 班表讀取中...</div>';try{const month=monthSelect.value,res=await jsonp(`${BASE_GAS_URL}?action=fetchSchedule&employeeId=${session.employeeId}&month=${encodeURIComponent(month)}`,"cb_s_"+Date.now()),map={};(res.schedule||[]).forEach(x=>map[parseInt(String(x.date).replace("日",""),10)]=x.shift);const mt=month.match(/(\d+)年(\d+)月/),y=+mt[1],mo=+mt[2],days=new Date(y,mo,0).getDate(),today=new Date(),week=["日","一","二","三","四","五","六"];let w=0,r=0,h="";for(let d=1;d<=days;d++){const text=map[d]||"",p=parseCell(text),rest=!text||/休|特休|事假|病假|輪休/.test(p.shift);rest?r++:w++;const dt=new Date(y,mo-1,d),isToday=dt.toDateString()===today.toDateString();h+=`<div class="schedule-card ${isToday?"today":""}"><div class="date-row"><b>${mo}/${d}（${week[dt.getDay()]}）${isToday?"・今天":""}</b><span class="badge ${rest?"badge-wait":"badge-ok"}">${rest?"休假／未排":"值勤"}</span></div><div>${text?`<b>${esc(p.loc||"未指定案場")}</b><br>${esc(p.shift||"--")}${p.time?"・"+esc(p.time):""}`:"尚未排班"}</div></div>`}workDays.textContent=w;restDays.textContent=r;scheduleList.innerHTML=h}catch(e){scheduleList.innerHTML='<div class="card empty">班表讀取失敗，請稍後再試。</div>'}}
initMonths();loadSchedule();
</script></body></html>
